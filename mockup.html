<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스와이프 이펙트 목업 4종</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Arial Black',sans-serif;background:#0a0a14;color:#fff;min-height:100vh;padding:12px}
h1{text-align:center;font-size:16px;letter-spacing:4px;color:#cc88ff;margin-bottom:6px}
.sub{text-align:center;font-size:10px;color:rgba(255,255,255,.3);margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:860px;margin:0 auto}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(204,136,255,.12);border-radius:14px;padding:14px;text-align:center;position:relative}
.tag{position:absolute;top:8px;right:10px;font-size:9px;padding:2px 8px;border-radius:8px;font-weight:900}
.card-title{font-size:15px;font-weight:900;letter-spacing:2px;margin-bottom:2px}
.card-desc{font-size:9px;color:rgba(255,255,255,.3);margin-bottom:10px;line-height:1.4}
.kp{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;width:220px;margin:0 auto;position:relative}
.k{height:56px;border:1px solid rgba(255,200,255,.1);border-radius:8px;
  background:rgba(255,255,255,.04);color:rgba(220,240,255,.6);
  font-size:20px;font-weight:900;display:flex;align-items:center;justify-content:center;
  position:relative;z-index:2;transition:all .2s}
.num-preview{font-size:26px;font-weight:900;margin-top:8px;letter-spacing:3px}

/* A: 네온 레이저 */
.kp-a .k.on{border-color:rgba(204,136,255,.7);color:#fff;
  background:linear-gradient(180deg,rgba(204,136,255,.2),rgba(204,136,255,.06));
  box-shadow:0 0 22px rgba(204,136,255,.4);text-shadow:0 0 12px rgba(204,136,255,.7);transform:scale(1.08)}
.laser{position:absolute;z-index:1;height:5px;border-radius:3px;
  background:linear-gradient(90deg,rgba(204,136,255,.95),rgba(204,136,255,.7));
  box-shadow:0 0 14px rgba(204,136,255,.8),0 0 35px rgba(204,136,255,.35);transform-origin:left center}
.laser-w{position:absolute;z-index:0;height:24px;border-radius:12px;
  background:rgba(204,136,255,.1);transform-origin:left center}
.num-a{color:#cc88ff;text-shadow:0 0 20px rgba(204,136,255,.6);animation:pa 1s ease infinite}
@keyframes pa{0%,100%{opacity:.85}50%{text-shadow:0 0 30px rgba(204,136,255,.9)}}

/* B: 전기 아크 */
.kp-b .k.on{border-color:rgba(68,221,255,.7);color:#fff;
  background:linear-gradient(180deg,rgba(68,221,255,.15),rgba(68,221,255,.04));
  box-shadow:0 0 20px rgba(68,221,255,.35);animation:fb .12s ease infinite alternate}
@keyframes fb{0%{box-shadow:0 0 20px rgba(68,221,255,.35)}100%{box-shadow:0 0 30px rgba(68,221,255,.55)}}
.bseg{position:absolute;z-index:1;height:3px;background:#44ddff;border-radius:2px;
  box-shadow:0 0 8px rgba(68,221,255,.9),0 0 18px rgba(68,221,255,.4);transform-origin:left center}
.bglow{position:absolute;z-index:0;height:16px;border-radius:8px;background:rgba(68,221,255,.06);transform-origin:left center}
.num-b{color:#44ddff;text-shadow:0 0 15px rgba(68,221,255,.6);animation:fb2 .1s ease infinite}
@keyframes fb2{0%{opacity:1}50%{opacity:.8}100%{opacity:1}}

/* C: 파티클 스트림 */
.kp-c .k.on{border-color:rgba(68,255,170,.6);color:#44ffaa;
  background:linear-gradient(180deg,rgba(68,255,170,.12),rgba(68,255,170,.03));
  box-shadow:0 0 22px rgba(68,255,170,.3);text-shadow:0 0 10px rgba(68,255,170,.5);transform:scale(1.06)}
.pdot{position:absolute;border-radius:50%;z-index:3;
  animation:pf var(--dur) ease-in-out infinite}
@keyframes pf{
  0%{left:var(--sx);top:var(--sy);opacity:0;transform:scale(0)}
  15%{opacity:1;transform:scale(1.4)}
  85%{opacity:.7}
  100%{left:var(--ex);top:var(--ey);opacity:0;transform:scale(0)}}
.num-c{color:#44ffaa;text-shadow:0 0 15px rgba(68,255,170,.5)}

/* D: 웨이브 링 */
.kp-d .k.on{border-color:rgba(255,68,170,.6);color:#ff44aa;
  background:linear-gradient(180deg,rgba(255,68,170,.12),rgba(255,68,170,.04));
  box-shadow:0 0 22px rgba(255,68,170,.3);text-shadow:0 0 10px rgba(255,68,170,.5);transform:scale(1.06)}
.ring{position:absolute;border-radius:50%;z-index:1;
  border:2.5px solid;animation:re var(--dur) ease-out infinite}
@keyframes re{0%{width:12px;height:12px;opacity:.9;transform:translate(-50%,-50%)}
  100%{width:100px;height:100px;opacity:0;transform:translate(-50%,-50%)}}
.gorb{position:absolute;border-radius:50%;z-index:0;
  animation:gp .7s ease infinite alternate}
@keyframes gp{0%{opacity:.4;transform:translate(-50%,-50%) scale(.85)}100%{opacity:.9;transform:translate(-50%,-50%) scale(1.15)}}
.num-d{background:linear-gradient(90deg,#ff44aa,#cc88ff,#44ddff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:hs 1.5s linear infinite}
@keyframes hs{0%{filter:hue-rotate(0)}100%{filter:hue-rotate(360deg)}}
</style>
</head>
<body>
<h1>SWIPE EFFECT 목업</h1>
<p class="sub">3→4 스와이프 (34 빼기) 시 각 이펙트 비교</p>
<div class="grid">
  <div class="card"><div class="tag" style="background:rgba(204,136,255,.2);color:#cc88ff">A</div>
    <div class="card-title" style="color:#cc88ff">네온 레이저</div>
    <div class="card-desc">버튼 사이 빛나는 레이저 라인<br>깔끔하고 선명한 경로 표시</div>
    <div class="kp kp-a" id="kpA"></div><div class="num-preview num-a">-34</div></div>
  <div class="card"><div class="tag" style="background:rgba(68,221,255,.2);color:#44ddff">B</div>
    <div class="card-title" style="color:#44ddff">전기 아크</div>
    <div class="card-desc">지글거리는 번개 효과<br>강렬하고 임팩트 있는 느낌</div>
    <div class="kp kp-b" id="kpB"></div><div class="num-preview num-b">-34</div></div>
  <div class="card"><div class="tag" style="background:rgba(68,255,170,.2);color:#44ffaa">C</div>
    <div class="card-title" style="color:#44ffaa">파티클 스트림</div>
    <div class="card-desc">에너지 입자가 흘러가는 효과<br>속도감 있는 이동 느낌</div>
    <div class="kp kp-c" id="kpC"></div><div class="num-preview num-c">-34</div></div>
  <div class="card"><div class="tag" style="background:rgba(255,68,170,.2);color:#ff44aa">D</div>
    <div class="card-title" style="color:#ff44aa">웨이브 링</div>
    <div class="card-desc">파동 링이 퍼져나가는 효과<br>리듬감 있고 화려한 느낌</div>
    <div class="kp kp-d" id="kpD"></div><div class="num-preview num-d">-34</div></div>
</div>
<script>
function buildKP(id){const kp=document.getElementById(id);for(let i=1;i<=9;i++){const k=document.createElement('div');k.className='k';k.textContent=i;k.dataset.n=i;if(i===3||i===4)k.classList.add('on');kp.appendChild(k)}}
['kpA','kpB','kpC','kpD'].forEach(buildKP);
function kc(kp,n){const k=kp.querySelector(`[data-n="${n}"]`);return{x:k.offsetLeft+k.offsetWidth/2,y:k.offsetTop+k.offsetHeight/2}}

// A: Laser
!function(){const kp=document.getElementById('kpA'),a=kc(kp,3),b=kc(kp,4);
const dx=b.x-a.x,dy=b.y-a.y,len=Math.sqrt(dx*dx+dy*dy),ang=Math.atan2(dy,dx)*180/Math.PI;
const w=document.createElement('div');w.className='laser-w';
w.style.cssText=`left:${a.x}px;top:${a.y-12}px;width:${len}px;transform:rotate(${ang}deg)`;kp.appendChild(w);
const l=document.createElement('div');l.className='laser';
l.style.cssText=`left:${a.x}px;top:${a.y-2.5}px;width:${len}px;transform:rotate(${ang}deg)`;kp.appendChild(l)}();

// B: Electric
!function(){const kp=document.getElementById('kpB'),a=kc(kp,3),b=kc(kp,4);
const dx=b.x-a.x,dy=b.y-a.y,len=Math.sqrt(dx*dx+dy*dy),ang=Math.atan2(dy,dx)*180/Math.PI;
const bg=document.createElement('div');bg.className='bglow';
bg.style.cssText=`left:${a.x}px;top:${a.y-8}px;width:${len}px;transform:rotate(${ang}deg)`;kp.appendChild(bg);
function makeBolt(){const segs=6;for(let i=0;i<segs;i++){
  const old=kp.querySelectorAll('.bseg');old.forEach(o=>o.remove());
}
for(let i=0;i<segs;i++){const t=i/segs,t2=(i+1)/segs;
  const sx=a.x+dx*t,sy=a.y+dy*t+(Math.random()-.5)*22;
  const ex=a.x+dx*t2,ey=a.y+dy*t2+(Math.random()-.5)*22;
  const sdx=ex-sx,sdy=ey-sy,slen=Math.sqrt(sdx*sdx+sdy*sdy),sang=Math.atan2(sdy,sdx)*180/Math.PI;
  const s=document.createElement('div');s.className='bseg';
  s.style.cssText=`left:${sx}px;top:${sy-1.5}px;width:${slen}px;transform:rotate(${sang}deg)`;kp.appendChild(s)}}
makeBolt();setInterval(makeBolt,90)}();

// C: Particles
!function(){const kp=document.getElementById('kpC'),a=kc(kp,3),b=kc(kp,4);
const cols=['#44ffaa','#88ffcc','#22dd88','#66ffdd','#44ddff','#00ff88'];
for(let i=0;i<16;i++){const d=document.createElement('div');d.className='pdot';
const c=cols[i%cols.length],sz=3+Math.random()*6,jx=(Math.random()-.5)*16,jy=(Math.random()-.5)*16,dur=600+Math.random()*500;
d.style.cssText=`width:${sz}px;height:${sz}px;background:${c};box-shadow:0 0 ${sz+4}px ${c};--sx:${a.x-sz/2}px;--sy:${a.y-sz/2}px;--ex:${b.x-sz/2+jx}px;--ey:${b.y-sz/2+jy}px;--dur:${dur}ms;animation-delay:${i*70}ms`;
kp.appendChild(d)}}();

// D: Wave Rings
!function(){const kp=document.getElementById('kpD'),a=kc(kp,3),b=kc(kp,4);
[{p:a,c:'rgba(255,68,170,.6)',gc:'rgba(255,68,170,.18)'},{p:b,c:'rgba(68,221,255,.6)',gc:'rgba(68,221,255,.18)'}].forEach(({p,c,gc})=>{
for(let i=0;i<3;i++){const r=document.createElement('div');r.className='ring';
r.style.cssText=`left:${p.x}px;top:${p.y}px;border-color:${c};--dur:${1+i*.3}s;animation-delay:${i*.25}s`;kp.appendChild(r)}
const g=document.createElement('div');g.className='gorb';
g.style.cssText=`left:${p.x}px;top:${p.y}px;width:55px;height:55px;background:radial-gradient(circle,${gc},transparent 70%)`;kp.appendChild(g)})}();
</script>
</body>
</html>
