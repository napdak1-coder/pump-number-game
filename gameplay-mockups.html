<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>게임플레이 목업 v3 — 통합 인터페이스 + 다양한 배경효과 10종</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DotGothic16','Courier New',monospace;background:#060e18;color:#c0e8ff;overflow-x:hidden;image-rendering:pixelated}
.nav{position:fixed;top:0;left:0;right:0;z-index:999;background:#040a14;border-bottom:2px solid #143040;display:flex;gap:3px;padding:5px 6px;overflow-x:auto;white-space:nowrap}
.nav button{padding:5px 9px;border:2px solid #143040;background:#081828;color:#4888a8;font-size:9px;font-weight:700;cursor:pointer;flex-shrink:0;font-family:'DotGothic16',monospace}
.nav button.active{background:#143040;border-color:#2880a0;color:#70d0e8;box-shadow:0 0 8px rgba(40,128,160,.3)}
.wrap{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:56px 10px 20px}
.wrap.active{display:flex}
.phone{width:340px;height:700px;border-radius:24px;overflow:hidden;position:relative;border:3px solid #143848;box-shadow:0 0 30px rgba(30,90,120,.12)}
.phone-inner{width:100%;height:100%;position:relative;overflow:hidden;display:flex;flex-direction:column}
.lbl{margin-top:8px;font-size:10px;color:rgba(112,208,232,.3);text-align:center;letter-spacing:1px}
.desc{margin-top:4px;font-size:11px;color:rgba(112,208,232,.4);text-align:center;max-width:340px;line-height:1.5;margin-bottom:16px}

/* 캐릭터바 */
.char-bar{display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 14px 4px;position:relative;flex-shrink:0;z-index:2}
.char-bar-faces{display:flex;gap:5px;align-items:center}
.char-bar canvas.face{width:24px;height:24px;image-rendering:pixelated}
.char-bar canvas.dog{width:34px;height:38px;image-rendering:pixelated}
@keyframes cbWiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}}
@keyframes cbBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.char-bar canvas.face{animation:cbWiggle .8s ease infinite}
.char-bar canvas.face:nth-child(2){animation-delay:.15s}
.char-bar canvas.dog{animation:cbBob 1.2s ease infinite}

/* HUD */
.hud{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 6px;flex-shrink:0;border-bottom:2px solid rgba(255,200,60,.08);background:rgba(14,34,40,.4);z-index:2}
.hud-col{display:flex;flex-direction:column}
.hud-col.left{align-items:flex-start}
.hud-col.center{align-items:center}
.hud-col.right{align-items:flex-end}
.hud-lbl{font-size:10px;letter-spacing:2px;margin-bottom:2px;color:rgba(255,200,60,.35)}
.hud-val{font-size:26px;font-weight:900;color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,.3),2px 2px 0 rgba(0,0,0,.4)}
.hud-val.combo{color:#ffa830;text-shadow:0 0 10px rgba(255,168,48,.3),2px 2px 0 rgba(0,0,0,.4)}
.hud-tier{font-size:13px;letter-spacing:2px;color:#daa520}
.hud-lives{font-size:14px;letter-spacing:3px;margin-top:2px;color:rgba(255,80,80,.5)}

/* 타겟 영역 */
.target-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;z-index:1}
.mode-badge{font-size:10px;letter-spacing:3px;padding:3px 10px;margin-bottom:4px;font-weight:900;color:rgba(255,200,60,.4);border:1px solid rgba(255,200,60,.12);background:rgba(255,200,60,.03)}
.target-num{font-size:88px;font-weight:900;letter-spacing:2px;color:#ffe066;text-shadow:0 0 60px rgba(255,224,102,.5),5px 5px 0 #705808,0 0 30px rgba(255,180,0,.3);z-index:2}
.timer-wrap{width:70px;height:70px;position:relative;margin:6px auto 2px;z-index:2}
.timer-svg{position:absolute;top:0;left:0;width:70px;height:70px;transform:rotate(-90deg)}
.ct-bg{fill:none;stroke-width:5;stroke:#143838}
.ct-prog{fill:none;stroke-width:5;stroke-linecap:square;stroke:url(#ctGrad)}
.dog-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.dog-center canvas{width:28px;height:28px;image-rendering:pixelated}
.speed-mult{font-size:10px;letter-spacing:2px;color:rgba(255,200,60,.3);z-index:2}

/* 메시지 */
.msg-slot{text-align:center;padding:4px;flex-shrink:0;min-height:24px;z-index:2}
.msg-slot span{font-size:16px;color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,.4)}

/* 키패드 */
.keypad{padding:4px 10px 12px;flex-shrink:0;z-index:2}
.keypad-row{display:flex;gap:6px;justify-content:center;margin-bottom:6px}
.key-btn{width:90px;height:52px;font-size:26px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:0;background:rgba(255,200,60,.06);border:3px solid rgba(255,200,60,.15);color:#ffd700;font-family:'DotGothic16',monospace;box-shadow:4px 4px 0 rgba(100,70,0,.2);-webkit-tap-highlight-color:transparent}

/* 배경 애니메이션들 */
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}
@keyframes pixelRain{0%{transform:translateY(-10px);opacity:0}50%{opacity:.12}100%{transform:translateY(700px);opacity:0}}
@keyframes starTwinkle{0%,100%{opacity:.15;transform:scale(.5) rotate(0)}50%{opacity:1;transform:scale(1.2) rotate(180deg)}}
@keyframes hexFloat{0%{transform:translateY(0) rotate(0);opacity:.06}50%{opacity:.12}100%{transform:translateY(-650px) rotate(360deg);opacity:0}}
@keyframes ringPulse{0%{transform:scale(.3);opacity:.2}50%{opacity:.06}100%{transform:scale(3);opacity:0}}
@keyframes diamondDrift{0%{transform:translateY(700px) rotate(45deg);opacity:0}30%{opacity:.1}70%{opacity:.07}100%{transform:translateY(-20px) rotate(45deg);opacity:0}}
@keyframes crossBlink{0%,100%{opacity:0;transform:scale(0) rotate(0)}50%{opacity:.2;transform:scale(1) rotate(90deg)}}
@keyframes orbitDot{0%{transform:rotate(0) translateX(40px) scale(1)}50%{transform:rotate(180deg) translateX(40px) scale(1.6)}100%{transform:rotate(360deg) translateX(40px) scale(1)}}
@keyframes dustFloat{0%{transform:translate(0,0);opacity:0}20%{opacity:.12}80%{opacity:.08}100%{transform:translate(var(--dx),var(--dy));opacity:0}}
@keyframes waveRipple{0%{box-shadow:0 0 0 0 rgba(255,200,60,.08)}50%{box-shadow:0 0 0 20px rgba(255,200,60,0)}100%{box-shadow:0 0 0 0 rgba(255,200,60,0)}}
@keyframes neonFlicker{0%,100%{opacity:1}50%{opacity:.7}52%{opacity:1}70%{opacity:.85}72%{opacity:1}}
@keyframes cometTrail{0%{transform:translateX(-100px) translateY(100px);opacity:0}20%{opacity:.2}80%{opacity:.1}100%{transform:translateX(400px) translateY(-100px);opacity:0}}
@keyframes glowPulse{0%,100%{text-shadow:0 0 20px rgba(255,215,0,.3),5px 5px 0 #705808}50%{text-shadow:0 0 60px rgba(255,215,0,.7),5px 5px 0 #705808,0 0 80px rgba(255,180,0,.3)}}
@keyframes bubbleFloat{0%{transform:translateY(0) scale(1);opacity:.08}50%{opacity:.12}100%{transform:translateY(-600px) scale(1.5);opacity:0}}
@keyframes zigzag{0%{transform:translateY(700px) translateX(0)}25%{transform:translateY(525px) translateX(20px)}50%{transform:translateY(350px) translateX(-20px)}75%{transform:translateY(175px) translateX(15px)}100%{transform:translateY(-10px) translateX(0);opacity:0}}
</style>
</head>
<body>
<div class="nav" id="nav"></div>
<script>
const MOCKUPS=10;
const nav=document.getElementById('nav');
for(let i=1;i<=MOCKUPS;i++){
  const btn=document.createElement('button');
  btn.textContent='#'+i;
  btn.onclick=()=>{
    document.querySelectorAll('.wrap').forEach(w=>w.classList.remove('active'));
    document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
    document.getElementById('m'+i).classList.add('active');
    btn.classList.add('active');
    initMockup(i);
  };
  nav.appendChild(btn);
}

/* 픽셀 강아지 */
function drawPixelDog(c,bc,ec,cc,au){
  const W=14,H=16;c.width=W;c.height=H;c.style.imageRendering='pixelated';
  const x=c.getContext('2d');x.imageSmoothingEnabled=false;
  const p=(a,b,cl)=>{x.fillStyle=cl;x.fillRect(a,b,1,1)};
  const O='#333',W2='#fff';
  p(2,0,O);p(3,0,O);p(10,0,O);p(11,0,O);
  p(1,1,O);p(2,1,ec);p(3,1,ec);p(4,1,O);p(9,1,O);p(10,1,ec);p(11,1,ec);p(12,1,O);
  p(1,2,O);p(2,2,ec);p(3,2,ec);p(4,2,O);p(9,2,O);p(10,2,ec);p(11,2,ec);p(12,2,O);
  for(let i=3;i<=10;i++)p(i,3,O);
  p(2,4,O);for(let i=3;i<=10;i++)p(i,4,bc);p(11,4,O);
  p(2,5,O);for(let i=3;i<=10;i++)p(i,5,bc);p(11,5,O);
  p(4,5,W2);p(5,5,O);p(8,5,W2);p(9,5,O);
  p(2,6,O);for(let i=3;i<=10;i++)p(i,6,bc);p(11,6,O);
  p(6,6,O);p(7,6,O);p(3,6,cc);p(10,6,cc);
  p(2,7,O);for(let i=3;i<=10;i++)p(i,7,bc);p(11,7,O);
  for(let y=8;y<=11;y++){p(3,y,O);for(let i=4;i<=9;i++)p(i,y,bc);p(10,y,O)}
  if(au){p(2,8,O);p(3,8,bc);p(3,7,O);p(2,7,bc);p(10,8,bc);p(11,8,O);p(10,7,O);p(11,7,bc)}
  else{p(3,9,O);p(2,10,O);p(10,9,O);p(11,10,O)}
  p(4,12,O);p(5,12,O);p(8,12,O);p(9,12,O);
  p(3,13,O);p(4,13,bc);p(5,13,O);p(8,13,O);p(9,13,bc);p(10,13,O);
}

/* 메롱 얼굴 */
function drawTauntFace(c,st,mc){
  const W=14,H=14;c.width=W;c.height=H;c.style.imageRendering='pixelated';
  const x=c.getContext('2d');x.imageSmoothingEnabled=false;
  const p=(a,b,cl)=>{x.fillStyle=cl;x.fillRect(a,b,1,1)};
  const O='#333',W2='#fff',s=parseInt(st)%5,fc=mc;
  for(let i=4;i<=9;i++)p(i,0,O);
  p(3,1,O);for(let i=4;i<=9;i++)p(i,1,fc);p(10,1,O);
  for(let y=2;y<=9;y++){p(2,y,O);for(let i=3;i<=10;i++)p(i,y,fc);p(11,y,O)}
  p(3,10,O);for(let i=4;i<=9;i++)p(i,10,fc);p(10,10,O);
  for(let i=4;i<=9;i++)p(i,11,O);
  if(s===0){
    x.clearRect(0,0,W,H);
    for(let i=4;i<=9;i++)p(i,0,O);p(3,1,O);for(let i=4;i<=9;i++)p(i,1,fc);p(10,1,O);
    for(let y=2;y<=9;y++){p(2,y,O);for(let i=3;i<=10;i++)p(i,y,fc);p(11,y,O)}
    p(3,10,O);for(let i=4;i<=9;i++)p(i,10,fc);p(10,10,O);for(let i=4;i<=9;i++)p(i,11,O);
    p(4,4,O);p(5,4,O);p(6,4,O);p(8,3,O);p(9,3,O);p(8,4,W2);p(9,4,O);p(8,5,O);p(9,5,O);
    p(5,7,O);p(6,7,O);p(7,7,O);p(8,7,O);p(5,8,O);p(6,8,'#ff6b6b');p(7,8,'#ff6b6b');p(8,8,O);
    p(6,9,'#ff6b6b');p(7,9,'#ff6b6b');p(6,10,O);p(7,10,O);
  }else if(s===1){
    p(4,4,O);p(5,4,O);p(6,4,O);p(8,4,O);p(9,4,O);p(10,4,O);
    p(3,5,'#ff9090');p(10,5,'#ff9090');
    p(5,7,O);p(6,7,O);p(7,7,O);p(8,7,O);p(9,7,O);
    p(6,8,O);p(7,8,'#ff5555');p(8,8,O);p(7,9,'#ff5555');p(7,10,'#ff5555');p(7,11,O);
  }else if(s===2){
    p(4,3,O);p(6,3,O);p(5,4,O);p(4,5,O);p(6,5,O);
    p(8,3,O);p(10,3,O);p(9,4,O);p(8,5,O);p(10,5,O);
    p(5,7,O);p(6,7,O);p(7,7,O);p(8,7,O);p(9,7,O);
    p(6,8,'#ff6b6b');p(7,8,'#ff6b6b');p(8,8,'#ff6b6b');
    p(6,9,O);p(7,9,'#ff4040');p(8,9,O);p(7,10,O);
  }else if(s===3){
    p(4,3,O);p(6,3,O);p(5,3,O);p(4,4,O);p(6,4,O);
    p(8,3,O);p(10,3,O);p(9,3,O);p(8,4,O);p(10,4,O);
    p(3,5,'#ffb0b0');p(10,5,'#ffb0b0');
    p(5,7,O);p(6,7,O);p(7,7,O);p(8,7,O);p(6,8,'#ff7070');p(7,8,'#ff7070');
    p(5,9,O);p(6,9,'#ff5050');p(7,9,O);
  }else{
    p(4,3,O);p(5,3,O);p(4,4,W2);p(5,4,O);p(8,3,O);p(9,3,O);p(8,4,W2);p(9,4,O);
    p(5,7,O);p(6,7,O);p(7,7,O);p(8,7,O);p(9,6,O);
    p(6,8,'#ff6b6b');p(7,8,'#ff6b6b');p(6,9,O);p(7,9,O);
  }
}

const MIX=['#ffd040','#ff8060','#60e880','#60d0e0','#ff80c0'];
const GOLD=['#ffd700','#ffe066','#ffcc00','#ffb830','#f0c030'];

/* ==================== 배경 이펙트 라이브러리 ==================== */
function fxSparkle(el,n,cs){cs=cs||GOLD;for(let i=0;i<n;i++){const d=document.createElement('div');d.style.cssText=`position:absolute;width:${3+Math.random()*3}px;height:${3+Math.random()*3}px;background:${cs[i%cs.length]};opacity:0;left:${5+Math.random()*90}%;top:${5+Math.random()*90}%;animation:sparkle ${1+Math.random()*2}s ease ${Math.random()*3}s infinite;pointer-events:none;z-index:0`;el.appendChild(d)}}

function fxPixelRain(el,n,cs){cs=cs||MIX;for(let i=0;i<n;i++){const d=document.createElement('div');d.style.cssText=`position:absolute;width:3px;height:3px;background:${cs[i%cs.length]};opacity:0;left:${Math.random()*100}%;top:-5%;animation:pixelRain ${3+Math.random()*4}s linear ${Math.random()*4}s infinite;pointer-events:none;z-index:0`;el.appendChild(d)}}

function fxStarTwinkle(el,n,cs){cs=cs||GOLD;for(let i=0;i<n;i++){const d=document.createElement('div');d.textContent='✦';d.style.cssText=`position:absolute;font-size:${4+Math.random()*7}px;color:${cs[i%cs.length]};opacity:.15;left:${5+Math.random()*90}%;top:${5+Math.random()*90}%;animation:starTwinkle ${2+Math.random()*3}s ease ${Math.random()*4}s infinite;pointer-events:none;z-index:0;line-height:1`;el.appendChild(d)}}

function fxHexFloat(el,n,cs){cs=cs||['rgba(255,200,60,.08)','rgba(255,160,40,.06)','rgba(255,220,80,.05)'];for(let i=0;i<n;i++){const d=document.createElement('div');const sz=10+Math.random()*20;d.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;border:1px solid ${cs[i%cs.length]};clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);left:${Math.random()*100}%;bottom:-30px;animation:hexFloat ${8+Math.random()*10}s linear ${Math.random()*6}s infinite;pointer-events:none;z-index:0`;el.appendChild(d)}}

function fxRingPulse(el,n,c){c=c||'rgba(255,200,60,.06)';for(let i=0;i<n;i++){const d=document.createElement('div');d.style.cssText=`position:absolute;width:60px;height:60px;border-radius:50%;border:1px solid ${c};left:${10+Math.random()*80}%;top:${20+Math.random()*60}%;animation:ringPulse ${3+Math.random()*4}s ease ${Math.random()*5}s infinite;pointer-events:none;z-index:0;transform:translate(-50%,-50%)`;el.appendChild(d)}}

function fxDiamond(el,n,cs){cs=cs||['rgba(255,215,0,.08)','rgba(255,180,60,.06)','rgba(96,216,224,.05)'];for(let i=0;i<n;i++){const d=document.createElement('div');const sz=4+Math.random()*8;d.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:${cs[i%cs.length]};left:${Math.random()*100}%;bottom:-10px;animation:diamondDrift ${6+Math.random()*8}s linear ${Math.random()*5}s infinite;pointer-events:none;z-index:0`;el.appendChild(d)}}

function fxCrossBlink(el,n,cs){cs=cs||MIX;for(let i=0;i<n;i++){const d=document.createElement('div');d.textContent='+';d.style.cssText=`position:absolute;font-size:${8+Math.random()*10}px;color:${cs[i%cs.length]};opacity:0;left:${5+Math.random()*90}%;top:${5+Math.random()*90}%;animation:crossBlink ${2+Math.random()*3}s ease ${Math.random()*4}s infinite;pointer-events:none;z-index:0;font-weight:900;line-height:1`;el.appendChild(d)}}

function fxOrbitDots(el,n,cs){cs=cs||MIX;for(let i=0;i<n;i++){const w=document.createElement('div');const sz=3+Math.random()*3;w.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;left:50%;top:45%;animation:orbitDot ${4+Math.random()*6}s linear ${i*.6}s infinite;pointer-events:none;z-index:0`;const d=document.createElement('div');d.style.cssText=`width:100%;height:100%;background:${cs[i%cs.length]};opacity:.2`;w.appendChild(d);el.appendChild(w)}}

function fxDust(el,n,cs){cs=cs||['rgba(255,200,60,.12)','rgba(255,180,80,.08)'];for(let i=0;i<n;i++){const d=document.createElement('div');const sz=2+Math.random()*3;const dx=(Math.random()-.5)*150;const dy=(Math.random()-.5)*150;d.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:${cs[i%cs.length]};left:${Math.random()*100}%;top:${Math.random()*100}%;--dx:${dx}px;--dy:${dy}px;animation:dustFloat ${4+Math.random()*6}s ease ${Math.random()*4}s infinite;pointer-events:none;z-index:0`;el.appendChild(d)}}

function fxComet(el,n,cs){cs=cs||['rgba(255,215,0,.15)','rgba(255,180,60,.1)','rgba(255,128,200,.08)'];for(let i=0;i<n;i++){const d=document.createElement('div');d.style.cssText=`position:absolute;width:${20+Math.random()*30}px;height:2px;background:linear-gradient(90deg,${cs[i%cs.length]},transparent);left:-100px;top:${10+Math.random()*80}%;animation:cometTrail ${3+Math.random()*5}s linear ${Math.random()*6}s infinite;pointer-events:none;z-index:0;transform:rotate(-20deg)`;el.appendChild(d)}}

function fxBubble(el,n,cs){cs=cs||['rgba(255,200,60,.06)','rgba(255,180,80,.04)','rgba(96,216,224,.04)'];for(let i=0;i<n;i++){const d=document.createElement('div');const sz=8+Math.random()*16;d.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;border-radius:50%;border:1px solid ${cs[i%cs.length]};left:${Math.random()*100}%;bottom:-20px;animation:bubbleFloat ${6+Math.random()*8}s linear ${Math.random()*5}s infinite;pointer-events:none;z-index:0`;el.appendChild(d)}}

function fxZigzag(el,n,cs){cs=cs||MIX;for(let i=0;i<n;i++){const d=document.createElement('div');const sz=3+Math.random()*3;d.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:${cs[i%cs.length]};opacity:.1;left:${Math.random()*100}%;bottom:-10px;animation:zigzag ${5+Math.random()*6}s linear ${Math.random()*5}s infinite;pointer-events:none;z-index:0`;el.appendChild(d)}}

/* SVG 타이머 */
function timerSVG(pct){
  const circ=2*Math.PI*34;const off=circ*(1-pct/100);
  return `<div class="timer-wrap">
    <svg class="timer-svg" viewBox="0 0 80 80">
      <defs><linearGradient id="ctGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#2898a0"/><stop offset="100%" stop-color="#50e880"/></linearGradient></defs>
      <circle class="ct-bg" cx="40" cy="40" r="34"/>
      <circle class="ct-prog" cx="40" cy="40" r="34" stroke-dasharray="${circ}" stroke-dashoffset="${off}"/>
    </svg>
    <div class="dog-center"><canvas class="timer-dog" width="14" height="16"></canvas></div>
  </div>`;
}

/* 키패드 */
function keypad(){
  const rows=[[1,2,3],[4,5,6],[7,8,9]];
  let h='<div class="keypad">';
  rows.forEach(r=>{h+='<div class="keypad-row">';r.forEach(n=>{h+=`<button class="key-btn">${n}</button>`});h+='</div>'});
  return h+'</div>';
}

/* 공통 화면 생성 */
function screen(id,score,tier,stage,combo,lives,target,speed,msg,bg){
  const heartsStr=Array.from({length:3},(_, i)=>i<lives?'♥':'♡').join(' ');
  return `<div class="phone"><div class="phone-inner" id="${id}inner" style="${bg}">
    <div class="char-bar">
      <div class="char-bar-faces"><canvas class="face" data-s="0" data-c="#ffd040"></canvas><canvas class="face" data-s="1" data-c="#ff8060"></canvas></div>
      <canvas class="dog"></canvas>
      <div class="char-bar-faces"><canvas class="face" data-s="2" data-c="#60e880"></canvas><canvas class="face" data-s="4" data-c="#60d0e0"></canvas></div>
    </div>
    <div class="hud">
      <div class="hud-col left"><div class="hud-lbl">점 수</div><div class="hud-val">${score.toLocaleString()}</div></div>
      <div class="hud-col center"><div class="hud-tier">${tier} ${stage}</div><div class="hud-lives">${heartsStr}</div></div>
      <div class="hud-col right"><div class="hud-lbl">콤 보</div><div class="hud-val combo">${combo}</div></div>
    </div>
    <div class="target-zone">
      <div class="mode-badge">▶ 목 표</div>
      <div class="target-num">${target}</div>
      ${timerSVG(65)}
      <div class="speed-mult">${speed}</div>
    </div>
    <div class="msg-slot"><span>${msg}</span></div>
    ${keypad()}
  </div></div>`;
}

function initMockup(n){
  const w=document.getElementById('m'+n);if(!w)return;
  w.querySelectorAll('canvas.face').forEach(c=>drawTauntFace(c,c.dataset.s,c.dataset.c));
  w.querySelectorAll('canvas.dog,canvas.timer-dog').forEach(c=>drawPixelDog(c,'#f9a870','#e8e0d8','#ffb0b0',true));

}
