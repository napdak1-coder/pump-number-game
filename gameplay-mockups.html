<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>게임플레이 목업 v2 — 강아지+네온숫자+반짝이 10종</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DotGothic16','Courier New',monospace;background:#060e18;color:#c0e8ff;overflow-x:hidden;image-rendering:pixelated}
.nav{position:fixed;top:0;left:0;right:0;z-index:999;background:#040a14;border-bottom:2px solid #143040;display:flex;gap:3px;padding:5px 6px;overflow-x:auto;white-space:nowrap}
.nav button{padding:5px 9px;border:2px solid #143040;background:#081828;color:#4888a8;font-size:9px;font-weight:700;cursor:pointer;flex-shrink:0;font-family:'DotGothic16',monospace}
.nav button.active{background:#143040;border-color:#2880a0;color:#70d0e8;box-shadow:0 0 8px rgba(40,128,160,.3)}
.wrap{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:56px 10px 20px}
.wrap.active{display:flex}
.phone{width:340px;height:680px;border-radius:24px;overflow:hidden;position:relative;border:3px solid #143848;box-shadow:0 0 30px rgba(30,90,120,.12)}
.phone-inner{width:100%;height:100%;position:relative;overflow:hidden;display:flex;flex-direction:column}
.lbl{margin-top:8px;font-size:10px;color:rgba(112,208,232,.3);text-align:center;letter-spacing:1px}
.desc{margin-top:4px;font-size:11px;color:rgba(112,208,232,.4);text-align:center;max-width:340px;line-height:1.5;margin-bottom:16px}

.hud{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;flex-shrink:0}
.hud-col{display:flex;flex-direction:column}
.hud-col.left{align-items:flex-start}
.hud-col.center{align-items:center}
.hud-col.right{align-items:flex-end}
.hud-lbl{font-size:10px;letter-spacing:2px;margin-bottom:2px}
.hud-val{font-size:26px;font-weight:900}
.hud-tier{font-size:13px;letter-spacing:2px}
.hud-lives{font-size:14px;letter-spacing:3px;margin-top:2px}
.target-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.mode-badge{font-size:10px;letter-spacing:3px;padding:3px 10px;margin-bottom:4px;font-weight:900}
.target-num{font-weight:900;letter-spacing:2px}
.timer-wrap{width:70px;height:70px;position:relative;margin:6px auto 2px}
.timer-svg{position:absolute;top:0;left:0;width:70px;height:70px;transform:rotate(-90deg)}
.ct-bg{fill:none;stroke-width:5}
.ct-prog{fill:none;stroke-width:5;stroke-linecap:square}
.dog-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.dog-center canvas{width:28px;height:28px;image-rendering:pixelated}
.speed-mult{font-size:10px;letter-spacing:2px;margin-top:2px}
.msg-slot{text-align:center;padding:4px;flex-shrink:0;min-height:24px}
.keypad{padding:4px 10px 16px;flex-shrink:0}
.keypad-row{display:flex;gap:6px;justify-content:center;margin-bottom:6px}
.key-btn{width:90px;height:56px;font-size:28px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;border-radius:0}

/* 강아지 관련 */
.dog-area{display:flex;align-items:center;gap:8px;margin-bottom:6px;z-index:2}
.bubble{background:rgba(255,200,60,.08);border:2px solid rgba(255,200,60,.15);padding:5px 10px;position:relative;border-radius:0;font-size:11px}
.bubble::before{content:'';position:absolute;left:-6px;top:50%;width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-right:6px solid rgba(255,200,60,.15);transform:translateY(-50%)}

/* 애니메이션 */
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}
@keyframes pixelRain{0%{transform:translateY(-10px);opacity:0}50%{opacity:.12}100%{transform:translateY(700px);opacity:0}}
@keyframes glowPulse{0%,100%{text-shadow:0 0 20px rgba(255,215,0,.3),4px 4px 0 #705808}50%{text-shadow:0 0 50px rgba(255,215,0,.6),4px 4px 0 #705808,0 0 80px rgba(255,180,0,.3)}}
@keyframes floatBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes starTwinkle{0%,100%{opacity:.2;transform:scale(.5) rotate(0)}50%{opacity:1;transform:scale(1.2) rotate(180deg)}}
@keyframes hexFloat{0%{transform:translateY(0) rotate(0);opacity:.08}50%{opacity:.15}100%{transform:translateY(-600px) rotate(360deg);opacity:0}}
@keyframes ringPulse{0%{transform:scale(.5);opacity:.3}50%{opacity:.08}100%{transform:scale(2.5);opacity:0}}
@keyframes diamondDrift{0%{transform:translateY(700px) rotate(45deg);opacity:0}30%{opacity:.12}70%{opacity:.08}100%{transform:translateY(-20px) rotate(45deg);opacity:0}}
@keyframes crossBlink{0%,100%{opacity:0;transform:scale(0) rotate(0)}50%{opacity:.25;transform:scale(1) rotate(90deg)}}
@keyframes orbitDot{0%{transform:rotate(0) translateX(30px) scale(1)}50%{transform:rotate(180deg) translateX(30px) scale(1.5)}100%{transform:rotate(360deg) translateX(30px) scale(1)}}
@keyframes gridPulseWave{0%,100%{opacity:.03}50%{opacity:.1}}
@keyframes dustFloat{0%{transform:translate(0,0);opacity:0}20%{opacity:.15}80%{opacity:.1}100%{transform:translate(var(--dx),var(--dy));opacity:0}}
@keyframes waveRipple{0%{box-shadow:0 0 0 0 rgba(255,200,60,.1)}50%{box-shadow:0 0 0 15px rgba(255,200,60,0)}100%{box-shadow:0 0 0 0 rgba(255,200,60,0)}}
@keyframes neonFlicker{0%,100%{opacity:1}50%{opacity:.7}52%{opacity:1}70%{opacity:.85}72%{opacity:1}}
</style>
</head>
<body>
<div class="nav" id="nav"></div>

<script>
const MOCKUPS=10;
const nav=document.getElementById('nav');
for(let i=1;i<=MOCKUPS;i++){
  const btn=document.createElement('button');
  btn.textContent='#'+i;
  btn.onclick=()=>{
    document.querySelectorAll('.wrap').forEach(w=>w.classList.remove('active'));
    document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
    document.getElementById('m'+i).classList.add('active');
    btn.classList.add('active');
    initMockup(i);
  };
  nav.appendChild(btn);
}

/* 픽셀 강아지 */
function drawPixelDog(canvas,bodyColor,earColor,cheekColor,armUp){
  const W=14,H=16;canvas.width=W;canvas.height=H;
  canvas.style.imageRendering='pixelated';
  const ctx=canvas.getContext('2d');ctx.imageSmoothingEnabled=false;
  function px(x,y,c){ctx.fillStyle=c;ctx.fillRect(x,y,1,1)}
  const O='#333',W2='#fff';
  px(2,0,O);px(3,0,O);px(10,0,O);px(11,0,O);
  px(1,1,O);px(2,1,earColor);px(3,1,earColor);px(4,1,O);px(9,1,O);px(10,1,earColor);px(11,1,earColor);px(12,1,O);
  px(1,2,O);px(2,2,earColor);px(3,2,earColor);px(4,2,O);px(9,2,O);px(10,2,earColor);px(11,2,earColor);px(12,2,O);
  for(let x=3;x<=10;x++)px(x,3,O);
  px(2,4,O);for(let x=3;x<=10;x++)px(x,4,bodyColor);px(11,4,O);
  px(2,5,O);for(let x=3;x<=10;x++)px(x,5,bodyColor);px(11,5,O);
  px(4,5,W2);px(5,5,O);px(8,5,W2);px(9,5,O);
  px(2,6,O);for(let x=3;x<=10;x++)px(x,6,bodyColor);px(11,6,O);
  px(6,6,O);px(7,6,O);px(6,7,bodyColor);px(7,7,bodyColor);
  px(3,6,cheekColor);px(10,6,cheekColor);
  px(2,7,O);for(let x=3;x<=10;x++)px(x,7,bodyColor);px(11,7,O);
  for(let y=8;y<=11;y++){px(3,y,O);for(let x=4;x<=9;x++)px(x,y,bodyColor);px(10,y,O)}
  if(armUp){px(2,8,O);px(3,8,bodyColor);px(3,7,O);px(2,7,bodyColor);px(10,8,bodyColor);px(11,8,O);px(10,7,O);px(11,7,bodyColor)}
  else{px(3,9,O);px(2,10,O);px(10,9,O);px(11,10,O)}
  px(4,12,O);px(5,12,O);px(8,12,O);px(9,12,O);
  px(3,13,O);px(4,13,bodyColor);px(5,13,O);px(8,13,O);px(9,13,bodyColor);px(10,13,O);
}

/* 메롱 얼굴 */
function drawTauntFace(canvas,style,mainColor){
  const W=14,H=14;canvas.width=W;canvas.height=H;
  canvas.style.imageRendering='pixelated';
  const ctx=canvas.getContext('2d');ctx.imageSmoothingEnabled=false;
  function px(x,y,c){ctx.fillStyle=c;ctx.fillRect(x,y,1,1)}
  const O='#333',W2='#fff';const s=parseInt(style)%5;const fc=mainColor;
  for(let x=4;x<=9;x++)px(x,0,O);
  px(3,1,O);for(let x=4;x<=9;x++)px(x,1,fc);px(10,1,O);
  for(let y=2;y<=9;y++){px(2,y,O);for(let x=3;x<=10;x++)px(x,y,fc);px(11,y,O)}
  px(3,10,O);for(let x=4;x<=9;x++)px(x,10,fc);px(10,10,O);
  for(let x=4;x<=9;x++)px(x,11,O);
  if(s===0){
    ctx.clearRect(0,0,W,H);
    for(let x=4;x<=9;x++)px(x,0,O);px(3,1,O);for(let x=4;x<=9;x++)px(x,1,fc);px(10,1,O);
    for(let y=2;y<=9;y++){px(2,y,O);for(let x=3;x<=10;x++)px(x,y,fc);px(11,y,O)}
    px(3,10,O);for(let x=4;x<=9;x++)px(x,10,fc);px(10,10,O);for(let x=4;x<=9;x++)px(x,11,O);
    px(4,4,O);px(5,4,O);px(6,4,O);px(8,3,O);px(9,3,O);px(8,4,W2);px(9,4,O);px(8,5,O);px(9,5,O);
    px(5,7,O);px(6,7,O);px(7,7,O);px(8,7,O);px(5,8,O);px(6,8,'#ff6b6b');px(7,8,'#ff6b6b');px(8,8,O);
    px(6,9,'#ff6b6b');px(7,9,'#ff6b6b');px(6,10,O);px(7,10,O);
  }else if(s===1){
    px(4,4,O);px(5,4,O);px(6,4,O);px(8,4,O);px(9,4,O);px(10,4,O);
    px(3,5,'#ff9090');px(10,5,'#ff9090');
    px(5,7,O);px(6,7,O);px(7,7,O);px(8,7,O);px(9,7,O);
    px(6,8,O);px(7,8,'#ff5555');px(8,8,O);px(7,9,'#ff5555');px(7,10,'#ff5555');px(7,11,O);
  }else if(s===2){
    px(4,3,O);px(6,3,O);px(5,4,O);px(4,5,O);px(6,5,O);
    px(8,3,O);px(10,3,O);px(9,4,O);px(8,5,O);px(10,5,O);
    px(5,7,O);px(6,7,O);px(7,7,O);px(8,7,O);px(9,7,O);
    px(6,8,'#ff6b6b');px(7,8,'#ff6b6b');px(8,8,'#ff6b6b');
    px(6,9,O);px(7,9,'#ff4040');px(8,9,O);px(7,10,O);
  }else if(s===3){
    px(4,3,O);px(6,3,O);px(5,3,O);px(4,4,O);px(6,4,O);
    px(8,3,O);px(10,3,O);px(9,3,O);px(8,4,O);px(10,4,O);
    px(3,5,'#ffb0b0');px(10,5,'#ffb0b0');
    px(5,7,O);px(6,7,O);px(7,7,O);px(8,7,O);px(6,8,'#ff7070');px(7,8,'#ff7070');
    px(5,9,O);px(6,9,'#ff5050');px(7,9,O);
  }else{
    px(4,3,O);px(5,3,O);px(4,4,W2);px(5,4,O);px(8,3,O);px(9,3,O);px(8,4,W2);px(9,4,O);
    px(5,7,O);px(6,7,O);px(7,7,O);px(8,7,O);px(9,6,O);
    px(6,8,'#ff6b6b');px(7,8,'#ff6b6b');px(6,9,O);px(7,9,O);
  }
}

const MIX=['#ffd040','#ff8060','#60e880','#60d0e0','#ff80c0'];

/* 배경 이펙트 함수들 */

// 1. 기본 반짝이 (사각형)
function fxSparkle(el,n,colors){
  colors=colors||['#ffd700'];
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    d.style.cssText=`position:absolute;width:${3+Math.random()*3}px;height:${3+Math.random()*3}px;background:${colors[i%colors.length]};opacity:0;left:${5+Math.random()*90}%;top:${5+Math.random()*90}%;animation:sparkle ${1+Math.random()*2}s ease ${Math.random()*3}s infinite;pointer-events:none;z-index:0;border-radius:0`;
    el.appendChild(d);
  }
}

// 2. 픽셀비 (위→아래)
function fxPixelRain(el,n,colors){
  colors=colors||MIX;
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    d.style.cssText=`position:absolute;width:3px;height:3px;background:${colors[i%colors.length]};opacity:0;left:${Math.random()*100}%;top:-5%;animation:pixelRain ${3+Math.random()*4}s linear ${Math.random()*4}s infinite;pointer-events:none;z-index:0`;
    el.appendChild(d);
  }
}

// 3. 별 반짝임 (회전 + 스케일)
function fxStarTwinkle(el,n,colors){
  colors=colors||['#ffd700','#ffe066','#ffb830'];
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    const sz=4+Math.random()*6;
    d.textContent='✦';
    d.style.cssText=`position:absolute;font-size:${sz}px;color:${colors[i%colors.length]};opacity:.2;left:${5+Math.random()*90}%;top:${5+Math.random()*90}%;animation:starTwinkle ${2+Math.random()*3}s ease ${Math.random()*4}s infinite;pointer-events:none;z-index:0;line-height:1`;
    el.appendChild(d);
  }
}

// 4. 떠다니는 육각형
function fxHexFloat(el,n,colors){
  colors=colors||['rgba(255,200,60,.1)','rgba(255,160,40,.08)','rgba(255,220,80,.06)'];
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    const sz=10+Math.random()*20;
    d.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;border:1px solid ${colors[i%colors.length]};clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);left:${Math.random()*100}%;bottom:-30px;animation:hexFloat ${8+Math.random()*10}s linear ${Math.random()*6}s infinite;pointer-events:none;z-index:0`;
    el.appendChild(d);
  }
}

// 5. 링 펄스 (퍼져나가는 원)
function fxRingPulse(el,n,color){
  color=color||'rgba(255,200,60,.08)';
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    d.style.cssText=`position:absolute;width:60px;height:60px;border-radius:50%;border:1px solid ${color};left:${10+Math.random()*80}%;top:${10+Math.random()*80}%;animation:ringPulse ${3+Math.random()*4}s ease ${Math.random()*5}s infinite;pointer-events:none;z-index:0;transform:translate(-50%,-50%)`;
    el.appendChild(d);
  }
}

// 6. 다이아몬드 떠오르기 (아래→위)
function fxDiamond(el,n,colors){
  colors=colors||['rgba(255,215,0,.1)','rgba(255,180,60,.08)','rgba(96,216,224,.06)'];
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    const sz=4+Math.random()*8;
    d.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:${colors[i%colors.length]};left:${Math.random()*100}%;bottom:-10px;animation:diamondDrift ${6+Math.random()*8}s linear ${Math.random()*5}s infinite;pointer-events:none;z-index:0`;
    el.appendChild(d);
  }
}

// 7. 십자 깜빡
function fxCrossBlink(el,n,colors){
  colors=colors||['#ffd040','#ff8060','#60e880'];
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    d.textContent='+';
    d.style.cssText=`position:absolute;font-size:${8+Math.random()*12}px;color:${colors[i%colors.length]};opacity:0;left:${5+Math.random()*90}%;top:${5+Math.random()*90}%;animation:crossBlink ${2+Math.random()*3}s ease ${Math.random()*4}s infinite;pointer-events:none;z-index:0;font-weight:900;line-height:1`;
    el.appendChild(d);
  }
}

// 8. 궤도 점 (중앙 기준 회전)
function fxOrbitDots(el,n,colors){
  colors=colors||['#ffd700','#ff8060','#60e880','#60d0e0','#ff80c0'];
  const cx=170,cy=300;
  for(let i=0;i<n;i++){
    const wrapper=document.createElement('div');
    const sz=3+Math.random()*4;
    wrapper.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;left:${cx}px;top:${cy}px;animation:orbitDot ${4+Math.random()*6}s linear ${i*.5}s infinite;pointer-events:none;z-index:0`;
    const dot=document.createElement('div');
    dot.style.cssText=`width:100%;height:100%;background:${colors[i%colors.length]};border-radius:0;opacity:.2`;
    wrapper.appendChild(dot);
    el.appendChild(wrapper);
  }
}

// 9. 먼지 파티클 (랜덤 방향)
function fxDust(el,n,colors){
  colors=colors||['rgba(255,200,60,.15)','rgba(255,180,80,.1)'];
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    const sz=2+Math.random()*3;
    const dx=(Math.random()-.5)*150;
    const dy=(Math.random()-.5)*150;
    d.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:${colors[i%colors.length]};left:${Math.random()*100}%;top:${Math.random()*100}%;--dx:${dx}px;--dy:${dy}px;animation:dustFloat ${4+Math.random()*6}s ease ${Math.random()*4}s infinite;pointer-events:none;z-index:0;border-radius:0`;
    el.appendChild(d);
  }
}

// 10. 웨이브 리플 (중앙에서 퍼짐)
function fxWaveRipple(el,n){
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    d.style.cssText=`position:absolute;width:4px;height:4px;background:rgba(255,200,60,.1);left:${20+Math.random()*60}%;top:${20+Math.random()*60}%;animation:waveRipple ${2+Math.random()*3}s ease ${Math.random()*4}s infinite;pointer-events:none;z-index:0;border-radius:0`;
    el.appendChild(d);
  }
}

/* SVG 원형 타이머 */
function timerSVG(pct,danger){
  const circ=2*Math.PI*34;const off=circ*(1-pct/100);
  const strokeColor=danger?'#e04040':'url(#ctGrad)';
  return `<div class="timer-wrap">
    <svg class="timer-svg" viewBox="0 0 80 80">
      <defs><linearGradient id="ctGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#2898a0"/><stop offset="100%" stop-color="#50e880"/></linearGradient></defs>
      <circle class="ct-bg" cx="40" cy="40" r="34" stroke="#143838"/>
      <circle class="ct-prog" cx="40" cy="40" r="34" stroke="${strokeColor}" stroke-dasharray="${circ}" stroke-dashoffset="${off}" ${danger?'style="animation:pulse .4s infinite"':''}/>
    </svg>
    <div class="dog-center"><canvas class="dog-cv" width="14" height="16"></canvas></div>
  </div>`;
}

/* 키패드 */
function keypadHTML(style){
  const rows=[[1,2,3],[4,5,6],[7,8,9]];
  let html='<div class="keypad">';
  rows.forEach(row=>{
    html+='<div class="keypad-row">';
    row.forEach(n=>{html+=`<button class="key-btn" style="${style}">${n}</button>`});
    html+='</div>';
  });
  html+='</div>';
  return html;
}

/* 강아지 + 말풍선 */
function dogBubble(msg,dogSize,dogAnim){
  dogSize=dogSize||56;dogAnim=dogAnim||'bob 1.2s ease infinite';
  return `<div class="dog-area">
    <canvas class="dog-cv" width="14" height="16" style="width:${dogSize}px;height:${Math.round(dogSize*16/14)}px;image-rendering:pixelated;animation:${dogAnim}"></canvas>
    <div class="bubble" style="color:#ffd700">${msg}</div>
  </div>`;
