<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000">
    <title>빼봐영</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        html, body {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            font-family: 'DotGothic16', sans-serif;
            background: #000;
            user-select: none;
            -webkit-user-select: none;
            overscroll-behavior: none;
        }

        body {
            padding: max(0px, env(safe-area-inset-top)) max(0px, env(safe-area-inset-right)) max(0px, env(safe-area-inset-bottom)) max(0px, env(safe-area-inset-left));
            position: relative;
        }

        /* Theme backgrounds */
        body.theme-space {
            background: linear-gradient(135deg, #0a0e27 0%, #1a0f3f 100%);
        }
        body.theme-ocean {
            background: linear-gradient(135deg, #0a1f3f 0%, #1a3f4f 100%);
        }
        body.theme-forest {
            background: linear-gradient(135deg, #0f2010 0%, #1f3f1f 100%);
        }
        body.theme-neon {
            background: linear-gradient(135deg, #2a0f4f 0%, #4f0f3f 100%);
        }

        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #canvas-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #canvas-effects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* Screens */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .screen.active {
            display: flex;
        }

        /* Start Screen */
        #startScreen {
            background: rgba(0, 0, 0, 0.95);
            color: #fff;
        }

        .title {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
            letter-spacing: 3px;
        }

        .character-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .char-canvas {
            width: 48px;
            height: 48px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 2px solid #00ffff;
            border-radius: 4px;
            background: #000;
        }

        .start-info {
            margin-bottom: 2rem;
            text-align: center;
            color: #aaa;
            font-size: 0.9rem;
        }

        .best-score {
            font-size: 1.2rem;
            color: #ffff00;
            margin-bottom: 0.5rem;
        }

        #startBtn {
            padding: 1rem 2rem;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #ff006e, #8338ec);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'DotGothic16', sans-serif;
            margin-bottom: 2rem;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        #startBtn:active {
            transform: scale(0.95);
        }

        .start-buttons {
            display: flex;
            gap: 1rem;
            position: absolute;
            bottom: 2rem;
            left: 0;
            right: 0;
            justify-content: center;
        }

        .corner-btn {
            padding: 0.7rem 1.5rem;
            font-size: 0.9rem;
            background: rgba(100, 100, 200, 0.3);
            color: #88ff;
            border: 1px solid #88ff;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'DotGothic16', sans-serif;
            touch-action: manipulation;
        }

        .corner-btn:active {
            transform: scale(0.95);
        }

        /* Game Screen */
        #gameScreen {
            flex-direction: column;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 1rem;
            gap: 1rem;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 400px;
            padding: 0 1rem;
            font-size: 0.9rem;
        }

        .lives-display {
            display: flex;
            gap: 0.5rem;
            font-size: 1.2rem;
        }

        .stage-display {
            text-align: center;
            color: #ffff00;
        }

        .combo-display {
            text-align: right;
            color: #00ff00;
            min-width: 100px;
        }

        .timer-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin: 0 1rem;
        }

        .timer-dots {
            display: flex;
            gap: 4px;
        }

        .timer-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff00;
            transition: background 0.1s;
        }

        .timer-dot.burned {
            background: rgba(0, 255, 0, 0.1);
        }

        .timer-dot.danger {
            background: #ff0000;
        }

        .timer-dot.danger.burned {
            background: rgba(255, 0, 0, 0.1);
        }

        .timer-text {
            font-size: 1.5rem;
            color: #00ff00;
            min-width: 40px;
            text-align: center;
            font-weight: bold;
        }

        .timer-text.danger {
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
        }

        .target-display {
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 0.5rem;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
            margin: 1rem 0;
            font-variant-numeric: tabular-nums;
        }

        .target-labels {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 1rem;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            max-width: 300px;
            width: 90%;
        }

        .key-btn {
            aspect-ratio: 1;
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #2a2a4a, #1a1a3a);
            color: #00ffff;
            border: 2px solid #00ffff;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'DotGothic16', sans-serif;
            transition: all 0.1s;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .key-btn:active {
            transform: scale(0.9);
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
        }

        .combo-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 20px currentColor;
            pointer-events: none;
            animation: comboFloat 0.8s ease-out;
            z-index: 200;
        }

        @keyframes comboFloat {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -150%) scale(1.5);
            }
        }

        .score-popup {
            position: fixed;
            pointer-events: none;
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
            animation: scoreFloat 1s ease-out;
            z-index: 200;
        }

        @keyframes scoreFloat {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-80px);
            }
        }

        /* Result Screen */
        #resultScreen {
            background: rgba(0, 0, 0, 0.95);
            color: #fff;
            gap: 2rem;
            padding: 2rem;
        }

        .result-title {
            font-size: 2rem;
            color: #ffff00;
            margin-bottom: 1rem;
        }

        .result-score {
            font-size: 3rem;
            color: #00ffff;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .result-rank {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .rank-S { color: #ff0000; }
        .rank-A { color: #ffaa00; }
        .rank-B { color: #00ff00; }
        .rank-C { color: #00ffff; }
        .rank-D { color: #ff00ff; }

        .result-stats {
            text-align: center;
            color: #aaa;
            font-size: 0.9rem;
            margin: 1rem 0;
        }

        .result-message {
            color: #ffaa00;
            font-size: 1rem;
            margin: 1rem 0;
            max-width: 300px;
            text-align: center;
        }

        .result-buttons {
            display: flex;
            gap: 1rem;
        }

        .result-btn {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #00aa00, #00ff00);
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'DotGothic16', sans-serif;
            touch-action: manipulation;
            transition: all 0.2s;
        }

        .result-btn.secondary {
            background: linear-gradient(135deg, #aa00aa, #ff00ff);
            color: #fff;
        }

        .result-btn:active {
            transform: scale(0.95);
        }

        /* Game Over Screen */
        #gameOverScreen {
            background: rgba(0, 0, 0, 0.95);
            color: #fff;
            gap: 2rem;
            padding: 2rem;
        }

        .gameover-title {
            font-size: 2.5rem;
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000;
            margin-bottom: 1rem;
        }

        .gameover-score {
            font-size: 2rem;
            color: #ffff00;
            margin-bottom: 1rem;
        }

        .gameover-stats {
            text-align: center;
            color: #aaa;
            font-size: 0.9rem;
            margin: 1rem 0;
        }

        .gameover-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .gameover-btn {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #ff006e, #8338ec);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'DotGothic16', sans-serif;
            touch-action: manipulation;
            transition: all 0.2s;
        }

        .gameover-btn.secondary {
            background: linear-gradient(135deg, #aa00aa, #ff00ff);
        }

        .gameover-btn:active {
            transform: scale(0.95);
        }

        /* Shake animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.3s;
        }

        .screen-shake {
            animation: shake 0.4s;
        }

        /* Tier up animation */
        @keyframes tierUp {
            0% {
                opacity: 0;
                transform: scale(0.5) translateY(20px);
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: scale(1.5) translateY(-100px);
            }
        }

        .tier-up-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffaa00;
            text-shadow: 0 0 30px #ffaa00;
            pointer-events: none;
            animation: tierUp 1.2s ease-out;
            z-index: 200;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .title {
                font-size: 3rem;
            }

            .target-display {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }

            .key-btn {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body class="theme-space">
    <!-- Background canvases -->
    <canvas id="canvas-bg"></canvas>
    <canvas id="canvas-particles"></canvas>
    <canvas id="canvas-effects"></canvas>

    <!-- Start Screen -->
    <div id="startScreen" class="screen active">
        <div class="title">빼봐영</div>
        <div class="character-row" id="startCharacters"></div>
        <div class="start-info">
            <div class="best-score" id="bestScoreDisplay">최고점수: 0</div>
            <div>숫자를 빼서 정확히 0을 만드세요</div>
        </div>
        <button id="startBtn">시작하기</button>
        <div class="start-buttons">
            <button class="corner-btn">컬렉션</button>
            <button class="corner-btn">랭킹</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="screen">
        <div class="game-header">
            <div class="lives-display" id="livesDisplay">♥ ♥ ♥</div>
            <div class="stage-display" id="stageDisplay">Stage 1</div>
            <div class="combo-display" id="comboDisplay">Combo: 0</div>
        </div>

        <div class="timer-container">
            <div class="timer-dots" id="timerDots"></div>
            <div class="timer-text" id="timerText">5.0s</div>
        </div>

        <div class="target-display" id="targetDisplay">00·00</div>
        <div class="target-labels">
            <div>십</div>
            <div>일</div>
        </div>

        <div class="keypad" id="keypad"></div>
    </div>

    <!-- Result Screen -->
    <div id="resultScreen" class="screen">
        <div class="result-title">맞았다!</div>
        <div class="result-score" id="resultScore">500</div>
        <div class="result-rank" id="resultRank"></div>
        <div class="result-stats" id="resultStats"></div>
        <div class="result-message" id="resultMessage"></div>
        <div class="result-buttons">
            <button class="result-btn" id="nextBtn">다음</button>
            <button class="result-btn secondary" id="retryBtn">다시하기</button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="screen">
        <div class="gameover-title">게임오버</div>
        <div class="gameover-score" id="gameoverScore">최종 점수: 0</div>
        <div class="gameover-stats" id="gameoverStats"></div>
        <div class="gameover-buttons">
            <button class="gameover-btn" id="restartBtn">재도전</button>
            <button class="gameover-btn secondary" id="homeBtn">홈으로</button>
        </div>
    </div>

    <script>
        // ============================================
        // GAME STATE & CONFIG
        // ============================================
        const CONFIG = {
            difficulties: [
                { stage: 0, tier: '초급', min: 5, max: 15, timerSpeed: 52 },
                { stage: 1, tier: '초급', min: 5, max: 15, timerSpeed: 52 },
                { stage: 2, tier: '초급', min: 10, max: 40, timerSpeed: 48 },
                { stage: 3, tier: '초급', min: 10, max: 40, timerSpeed: 48 },
                { stage: 4, tier: '초급', min: 10, max: 40, timerSpeed: 48 },
                { stage: 5, tier: '초급', min: 25, max: 70, timerSpeed: 44 },
                { stage: 6, tier: '초급', min: 25, max: 70, timerSpeed: 44 },
                { stage: 7, tier: '초급', min: 25, max: 70, timerSpeed: 44 },
                { stage: 8, tier: '중급', min: 40, max: 99, timerSpeed: 40 },
                { stage: 9, tier: '중급', min: 40, max: 99, timerSpeed: 40 },
                { stage: 10, tier: '중급', min: 40, max: 99, timerSpeed: 40 },
                { stage: 11, tier: '중급', min: 60, max: 130, timerSpeed: 35 },
                { stage: 12, tier: '중급', min: 60, max: 130, timerSpeed: 35 },
                { stage: 13, tier: '중급', min: 60, max: 130, timerSpeed: 35 },
                { stage: 14, tier: '중급', min: 80, max: 180, timerSpeed: 30 },
                { stage: 15, tier: '중급', min: 80, max: 180, timerSpeed: 30 },
                { stage: 16, tier: '중급', min: 80, max: 180, timerSpeed: 30 },
                { stage: 17, tier: '중급', min: 80, max: 180, timerSpeed: 30 },
                { stage: 18, tier: '고급', min: 150, max: 300, timerSpeed: 26 },
                { stage: 19, tier: '고급', min: 150, max: 300, timerSpeed: 26 },
                { stage: 20, tier: '고급', min: 150, max: 300, timerSpeed: 26 },
                { stage: 21, tier: '고급', min: 150, max: 300, timerSpeed: 26 },
                { stage: 22, tier: '고급', min: 250, max: 450, timerSpeed: 22 },
                { stage: 23, tier: '고급', min: 250, max: 450, timerSpeed: 22 },
                { stage: 24, tier: '고급', min: 250, max: 450, timerSpeed: 22 },
                { stage: 25, tier: '고급', min: 250, max: 450, timerSpeed: 22 },
                { stage: 26, tier: '고급', min: 350, max: 600, timerSpeed: 20 },
                { stage: 27, tier: '고급', min: 350, max: 600, timerSpeed: 20 },
                { stage: 28, tier: '고급', min: 350, max: 600, timerSpeed: 20 },
                { stage: 29, tier: '고급', min: 350, max: 600, timerSpeed: 20 },
            ],
            comboMilestones: [
                { combo: 3, text: '좋은데?!', color: '#00ffff' },
                { combo: 5, text: '불타오르다!', color: '#00ff00' },
                { combo: 7, text: '미쳤다!', color: '#ffaa00' },
                { combo: 10, text: '멈플수없다!', color: '#aa00ff' },
                { combo: 15, text: '압도적!', color: '#ff00ff' },
                { combo: 20, text: '신의경지!', color: '#ffff00' },
                { combo: 25, text: '인간승리!', color: '#ff6600' },
                { combo: 30, text: '전설!', color: '#ff0000' },
            ]
        };

        const THEMES = ['space', 'ocean', 'forest', 'neon'];
        const THEME_COLORS = {
            space: { primary: '#00ffff', secondary: '#ff006e', accent: '#8338ec' },
            ocean: { primary: '#00ffff', secondary: '#00ff88', accent: '#0088ff' },
            forest: { primary: '#00ff00', secondary: '#00ffaa', accent: '#ffaa00' },
            neon: { primary: '#ff00ff', secondary: '#ffaa00', accent: '#00ffff' }
        };

        let gameState = {
            currentScreen: 'start',
            stageCount: 0,
            lives: 3,
            combo: 0,
            maxCombo: 0,
            geniusCount: 0,
            target: 0,
            timeLeft: 100,
            timerRunning: false,
            tapCount: 0,
            bestScore: parseInt(localStorage.getItem('bestScore') || '0'),
            currentTheme: 'space',
            sessionStats: {
                correctCount: 0,
                totalRounds: 0
            }
        };

        // ============================================
        // CANVASES & DRAWING
        // ============================================
        const canvasBg = document.getElementById('canvas-bg');
        const canvasParticles = document.getElementById('canvas-particles');
        const canvasEffects = document.getElementById('canvas-effects');
        const ctxBg = canvasBg.getContext('2d', { willReadFrequently: true });
        const ctxParticles = canvasParticles.getContext('2d');
        const ctxEffects = canvasEffects.getContext('2d');

        function resizeCanvases() {
            [canvasBg, canvasParticles, canvasEffects].forEach(canvas => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }
        resizeCanvases();
        window.addEventListener('resize', resizeCanvases);

        let particles = [];
        let bgParticles = [];

        class Particle {
            constructor(x, y, vx, vy, color, life = 1, size = 3) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.maxLife = life;
                this.life = life;
                this.size = size;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.02;
                this.vy += 0.1;
            }

            draw(ctx) {
                const alpha = Math.max(0, this.life / this.maxLife);
                const rgb = this.color.includes('rgb') ? this.color : hexToRgb(this.color);
                ctx.fillStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`;
                ctx.fillRect(Math.floor(this.x), Math.floor(this.y), this.size, this.size);
            }

            isDead() { return this.life <= 0; }
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 255, b: 255 };
        }

        // ============================================
        // PIXEL CHARACTER DRAWING
        // ============================================
        const CHAR_COLORS = ['#ff0088', '#00ff88', '#ffaa00', '#0088ff', '#ff00ff'];

        function drawPixelCharacter(canvas, colorIndex, expression = 'idle') {
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 16, 16);

            const color = CHAR_COLORS[colorIndex];
            ctx.fillStyle = color;

            ctx.fillRect(4, 2, 8, 6);
            ctx.fillRect(5, 8, 6, 5);
            ctx.fillRect(2, 9, 2, 2);
            ctx.fillRect(12, 9, 2, 2);

            ctx.fillStyle = '#000';
            if (expression === 'idle') {
                ctx.fillRect(5, 4, 1, 1);
                ctx.fillRect(9, 4, 1, 1);
            } else if (expression === 'correct') {
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(5, 3, 2, 2);
                ctx.fillRect(9, 3, 2, 2);
            } else if (expression === 'wrong') {
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(5, 3, 2, 3);
                ctx.fillRect(9, 3, 2, 3);
            } else if (expression === 'fever') {
                ctx.fillStyle = '#ff00ff';
                ctx.fillRect(4, 3, 3, 3);
                ctx.fillRect(9, 3, 3, 3);
            }
        }

        // ============================================
        // SCREEN MANAGEMENT
        // ============================================
        function showScreen(screenName) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const screen = document.getElementById(screenName + 'Screen');
            if (screen) screen.classList.add('active');
            gameState.currentScreen = screenName;
        }

        function bindBtn(el, fn) {
            let touched = false;
            el.addEventListener('touchstart', (e) => {
                e.preventDefault();
                touched = true;
                fn();
            }, { passive: false });
            el.addEventListener('click', () => {
                if (touched) { touched = false; return; }
                fn();
            });
        }

        // ============================================
        // START SCREEN
        // ============================================
        function initStartScreen() {
            document.getElementById('bestScoreDisplay').textContent = `최고점수: ${gameState.bestScore.toLocaleString()}`;
            const charRow = document.getElementById('startCharacters');
            charRow.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const canvas = document.createElement('canvas');
                canvas.width = 16;
                canvas.height = 16;
                canvas.className = 'char-canvas';
                drawPixelCharacter(canvas, i, 'idle');
                charRow.appendChild(canvas);
            }
        }

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.querySelectorAll('.corner-btn').forEach((btn, idx) => {
            bindBtn(btn, () => {
                console.log(idx === 0 ? 'Collection' : 'Ranking');
            });
        });

        // ============================================
        // GAME FLOW
        // ============================================
        function startGame() {
            gameState.stageCount = 0;
            gameState.lives = 3;
            gameState.combo = 0;
            gameState.maxCombo = 0;
            gameState.geniusCount = 0;
            gameState.sessionStats = { correctCount: 0, totalRounds: 0 };
            gameState.currentTheme = THEMES[Math.floor(Math.random() * THEMES.length)];
            document.body.className = `theme-${gameState.currentTheme}`;
            showScreen('game');
            initGameScreen();
            startRound();
        }

        function initGameScreen() {
            const keypad = document.getElementById('keypad');
            keypad.innerHTML = '';
            for (let i = 1; i <= 9; i++) {
                const btn = document.createElement('button');
                btn.className = 'key-btn';
                btn.textContent = i;
                bindBtn(btn, () => tapKey(i));
                keypad.appendChild(btn);
            }

            const dotsContainer = document.getElementById('timerDots');
            dotsContainer.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const dot = document.createElement('div');
                dot.className = 'timer-dot';
                dotsContainer.appendChild(dot);
            }
        }

        function getDifficultyConfig(stage) {
            if (stage < CONFIG.difficulties.length) {
                return CONFIG.difficulties[stage];
            }
            const last = CONFIG.difficulties[CONFIG.difficulties.length - 1];
            const scale = Math.floor(stage / CONFIG.difficulties.length);
            return {
                tier: '고급+',
                min: Math.min(last.min + scale * 50, 500),
                max: Math.min(999, last.max + scale * 100),
                timerSpeed: Math.max(14, last.timerSpeed - scale * 2)
            };
        }

        function startRound() {
            gameState.tapCount = 0;
            gameState.timeLeft = 100;
            gameState.timerRunning = true;

            const config = getDifficultyConfig(gameState.stageCount);
            gameState.target = Math.floor(Math.random() * (config.max - config.min + 1)) + config.min;

            updateDisplay();
            updateTimer(config.timerSpeed);
        }

        function updateDisplay() {
            const tens = Math.floor(gameState.target / 10);
            const ones = gameState.target % 10;
            const display = `${tens}·${ones}`.padStart(3, '0');
            document.getElementById('targetDisplay').textContent = display;

            const stageNum = gameState.stageCount + 1;
            const config = getDifficultyConfig(gameState.stageCount);
            document.getElementById('stageDisplay').textContent = `${config.tier} ${stageNum}`;

            const livesText = '♥ '.repeat(gameState.lives) + (gameState.lives < 3 ? '♡ '.repeat(3 - gameState.lives) : '');
            document.getElementById('livesDisplay').textContent = livesText;

            const comboText = gameState.combo > 0 ? `Combo: ${gameState.combo}` : 'Combo: 0';
            document.getElementById('comboDisplay').textContent = comboText;
        }

        function updateTimer(timerSpeed) {
            const timerInterval = setInterval(() => {
                if (!gameState.timerRunning) {
                    clearInterval(timerInterval);
                    return;
                }

                gameState.timeLeft--;

                const timerText = document.getElementById('timerText');
                const secs = (gameState.timeLeft / 20).toFixed(1);
                timerText.textContent = secs + 's';

                if (gameState.timeLeft <= 25) {
                    timerText.classList.add('danger');
                } else {
                    timerText.classList.remove('danger');
                }

                const dots = document.querySelectorAll('.timer-dot');
                dots.forEach((dot, idx) => {
                    const burned = gameState.timeLeft < (idx + 1) * 8.33;
                    dot.classList.toggle('burned', burned);
                    if (gameState.timeLeft <= 25) {
                        dot.classList.toggle('danger', !burned);
                    } else {
                        dot.classList.remove('danger');
                    }
                });

                if (gameState.timeLeft <= 0) {
                    clearInterval(timerInterval);
                    gameState.timerRunning = false;
                    roundLost('시간초과!');
                }
            }, timerSpeed);
        }

        function tapKey(num) {
            if (!gameState.timerRunning) return;

            gameState.tapCount++;
            gameState.target -= num;

            burstParticles(window.innerWidth / 2, window.innerHeight / 2, THEME_COLORS[gameState.currentTheme].primary);

            if (gameState.target < 0) {
                roundLost('음수!');
            } else if (gameState.target === 0) {
                roundWon();
            } else {
                updateDisplay();
            }
        }

        function burstParticles(x, y, color) {
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2;
                const speed = 3 + Math.random() * 3;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                particles.push(new Particle(x, y, vx, vy, color, 0.5, 4));
            }
        }

        function roundWon() {
            gameState.timerRunning = false;
            gameState.combo++;
            gameState.maxCombo = Math.max(gameState.maxCombo, gameState.combo);
            gameState.sessionStats.correctCount++;
            gameState.sessionStats.totalRounds++;

            const milestone = CONFIG.comboMilestones.find(m => m.combo === gameState.combo);
            if (milestone) {
                showComboMessage(milestone.text, milestone.color);
            }

            const config = getDifficultyConfig(gameState.stageCount);
            const minTaps = Math.ceil(gameState.target / 9);
            let rank = '괜찮아!';
            let rankMult = 1;
            if (gameState.tapCount <= minTaps) {
                rank = '천재!';
                rankMult = 3;
                gameState.geniusCount++;
            } else if (gameState.tapCount <= minTaps * 1.3) {
                rank = '멋져!';
                rankMult = 2;
            } else if (gameState.tapCount <= minTaps * 1.8) {
                rank = '좋아!';
                rankMult = 1.2;
            }

            let speedMult = 1;
            if (gameState.timeLeft >= 80) speedMult = 3;
            else if (gameState.timeLeft >= 60) speedMult = 2.5;
            else if (gameState.timeLeft >= 40) speedMult = 2;
            else if (gameState.timeLeft >= 20) speedMult = 1.5;

            const baseScore = 50 + gameState.stageCount * 8 + gameState.combo * 15 + Math.ceil(gameState.timeLeft / 5);
            const score = Math.round(baseScore * rankMult * speedMult);

            showResult(score, rank, rankMult);
        }

        function roundLost(reason) {
            gameState.timerRunning = false;
            gameState.combo = 0;
            gameState.lives--;
            gameState.sessionStats.totalRounds++;

            const gameScreen = document.getElementById('gameScreen');
            gameScreen.classList.add('screen-shake');
            setTimeout(() => gameScreen.classList.remove('screen-shake'), 400);

            if (gameState.lives <= 0) {
                showGameOver();
            } else {
                updateDisplay();
                setTimeout(startRound, 1000);
            }
        }

        function showComboMessage(text, color) {
            const msg = document.createElement('div');
            msg.className = 'combo-message';
            msg.textContent = text;
            msg.style.color = color;
            msg.style.textShadow = `0 0 20px ${color}`;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 800);
        }

        function showResult(score, rank, rankMult) {
            const screen = document.getElementById('resultScreen');
            document.getElementById('resultScore').textContent = score.toLocaleString();
            document.getElementById('resultRank').textContent = rank;

            const rankClass = rankMult === 3 ? 'S' : rankMult === 2 ? 'A' : rankMult === 1.2 ? 'B' : 'C';
            document.getElementById('resultRank').className = `result-rank rank-${rankClass}`;
            document.getElementById('resultStats').textContent = `탭수: ${gameState.tapCount}회`;

            let msg = '';
            const nextStage = gameState.stageCount + 2;
            if (nextStage <= 30) {
                msg = `다음 스테이지까지 ${31 - nextStage}문제!`;
            }
            document.getElementById('resultMessage').textContent = msg;

            showScreen('result');

            setTimeout(() => {
                const oldTier = getDifficultyConfig(gameState.stageCount).tier;
                gameState.stageCount++;
                const newTier = getDifficultyConfig(gameState.stageCount).tier;
                if (oldTier !== newTier) {
                    showTierUpMessage(newTier);
                }
            }, 100);
        }

        function showTierUpMessage(tier) {
            const tierText = {
                '초급': '초급',
                '중급': '중급',
                '고급': '고급'
            };
            const msg = document.createElement('div');
            msg.className = 'tier-up-text';
            msg.textContent = `${tierText[tier]} 상승!`;
            msg.style.color = '#ffaa00';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 1200);
        }

        function showGameOver() {
            const finalScore = gameState.stageCount * 100 + gameState.geniusCount * 50;
            let rank = 'D';
            if (gameState.stageCount >= 30) rank = 'S';
            else if (gameState.stageCount >= 20) rank = 'A';
            else if (gameState.stageCount >= 10) rank = 'B';
            else if (gameState.stageCount >= 5) rank = 'C';

            document.getElementById('gameoverScore').textContent = `최종 점수: ${finalScore.toLocaleString()}`;
            document.getElementById('gameoverStats').textContent = `스테이지: ${gameState.stageCount + 1} / 최고 콤보: ${gameState.maxCombo} / 천재 횟수: ${gameState.geniusCount}`;

            if (finalScore > gameState.bestScore) {
                gameState.bestScore = finalScore;
                localStorage.setItem('bestScore', finalScore.toString());
            }

            showScreen('gameOver');
        }

        // ============================================
        // RESULT & GAMEOVER BUTTONS
        // ============================================
        document.getElementById('nextBtn').addEventListener('click', () => {
            showScreen('game');
            startRound();
        });

        document.getElementById('retryBtn').addEventListener('click', () => {
            startGame();
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            startGame();
        });

        document.getElementById('homeBtn').addEventListener('click', () => {
            initStartScreen();
            showScreen('start');
        });

        // ============================================
        // BACKGROUND ANIMATION
        // ============================================
        function initBackgroundParticles() {
            bgParticles = [];
            for (let i = 0; i < 50; i++) {
                bgParticles.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2 + 1,
                    opacity: Math.random() * 0.5 + 0.3
                });
            }
        }

        function updateBackgroundParticles() {
            bgParticles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > window.innerWidth) p.vx *= -1;
                if (p.y < 0 || p.y > window.innerHeight) p.vy *= -1;
            });
        }

        function drawBackgroundParticles() {
            ctxBg.fillStyle = 'rgba(0, 0, 0, 0.02)';
            ctxBg.fillRect(0, 0, canvasBg.width, canvasBg.height);

            const color = THEME_COLORS[gameState.currentTheme].primary;
            const rgb = hexToRgb(color);
            ctxBg.fillStyle = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
            bgParticles.forEach(p => {
                ctxBg.globalAlpha = p.opacity;
                ctxBg.fillRect(p.x, p.y, p.size, p.size);
            });
            ctxBg.globalAlpha = 1;
        }

        // ============================================
        // PARTICLE SYSTEM
        // ============================================
        function updateParticles() {
            particles = particles.filter(p => {
                if (!p.isDead()) {
                    p.update();
                    return true;
                }
                return false;
            });
        }

        function drawParticles() {
            ctxParticles.clearRect(0, 0, canvasParticles.width, canvasParticles.height);
            particles.forEach(p => p.draw(ctxParticles));
        }

        // ============================================
        // MAIN LOOP
        // ============================================
        initBackgroundParticles();
        initStartScreen();

        function gameLoop() {
            updateBackgroundParticles();
            drawBackgroundParticles();

            updateParticles();
            drawParticles();

            requestAnimationFrame(gameLoop);
        }

        gameLoop();

        // ============================================
        // MOBILE OPTIMIZATION
        // ============================================
        document.addEventListener('touchmove', (e) => {
            if (gameState.currentScreen === 'game') {
                e.preventDefault();
            }
        }, { passive: false });

        document.addEventListener('gesturestart', (e) => {
            e.preventDefault();
        });

        // Audio context for sound effects
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(frequency, duration) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.frequency.value = frequency;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.1, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + duration);
        }

        document.addEventListener('touchstart', () => {
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        });
    </script>
</body>
</html>
