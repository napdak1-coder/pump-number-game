html, body {

.startBtn {

.shake {

@keyframes shake {

  20% { transform: translate(5px, -3px); }

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const screenMap = { start: 'screenStart', gameplay: 'screenGameplay', gameover: 'screenGameOver', collection: 'screenCollection', ranking: 'screenRanking' };
  document.getElementById(screenMap[name]).classList.add('active');
}

function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;
    if (type === 'correct') {
      [392, 494, 587].forEach((f, i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = f;
        g.gain.setValueAtTime(0.1, now + i * 0.05);
        g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.05 + 0.1);
        o.start(now + i * 0.05);
        o.stop(now + i * 0.05 + 0.1);
      });
    }
  } catch (e) {}
}

function drawPixelChar(ctx, body, cheek) {
  ctx.clearRect(0, 0, 16, 16);
  ctx.fillStyle = body;
  for (let y = 2; y < 14; y++) for (let x = 2; x < 14; x++) ctx.fillRect(x, y, 1, 1);
  ctx.fillStyle = '#fff';
  ctx.fillRect(5, 5, 2, 2);
  ctx.fillRect(9, 5, 2, 2);
  ctx.fillStyle = '#000';
  ctx.fillRect(6, 5, 1, 1);
  ctx.fillRect(10, 5, 1, 1);
  ctx.fillRect(6, 10, 4, 1);
  ctx.fillStyle = cheek;
  ctx.fillRect(3, 9, 2, 2);
  ctx.fillRect(11, 9, 2, 2);
}

function drawCharFace(canvasOrCtx, state) {
  const ctx = canvasOrCtx.getContext ? canvasOrCtx.getContext('2d') : canvasOrCtx;
  const colors = { idle: '#e09020', correct: '#30b030', wrong: '#e04040', fever: '#e09020' };
  const cheeks = { idle: '#ffcc66', correct: '#80e080', wrong: '#ff8080', fever: '#ffcc66' };
  ctx.clearRect(0, 0, 16, 16);
  ctx.fillStyle = colors[state];
  for (let y = 2; y < 14; y++) for (let x = 2; x < 14; x++) ctx.fillRect(x, y, 1, 1);
  ctx.fillStyle = '#fff';
  ctx.fillRect(5, 5, 2, 2);
  ctx.fillRect(9, 5, 2, 2);
  if (state === 'correct') {
    ctx.fillStyle = '#000';
    ctx.fillRect(5, 5, 2, 1);
    ctx.fillRect(9, 5, 2, 1);
    ctx.fillRect(6, 10, 4, 1);
    ctx.fillRect(7, 11, 2, 1);
  } else if (state === 'wrong') {
    ctx.fillStyle = '#000';
    ctx.fillRect(6, 5, 1, 1);
    ctx.fillRect(10, 5, 1, 1);
    ctx.fillStyle = '#40a0ff';
    ctx.fillRect(5, 7, 2, 2);
    ctx.fillRect(9, 7, 2, 2);
    ctx.fillStyle = '#000';
    ctx.fillRect(7, 11, 2, 1);
  }
  ctx.fillStyle = cheeks[state];
  ctx.fillRect(3, 9, 2, 2);
  ctx.fillRect(11, 9, 2, 2);
}

function getComboStage(c) {
  for (let i = comboStages.length - 1; i >= 0; i--) if (c >= comboStages[i].min) return i;
  return 0;
}

function updateComboUI() {
  const si = getComboStage(gameState.combo);
  const s = comboStages[si];
  const ns = si < comboStages.length - 1 ? comboStages[si + 1] : null;
  const fill = document.getElementById('gpComboFill');
  if (ns) {
    const p = (gameState.combo - s.min) / (ns.min - s.min) * 100;
    fill.style.width = Math.min(p, 100) + '%';
    fill.style.background = s.color === 'rainbow' ? 'linear-gradient(90deg, #f00, #ff0, #0f0, #0ff, #00f, #f0f)' : s.color;
    document.getElementById('gpComboLabel').textContent = gameState.combo + '/' + ns.min;
    document.getElementById('gpComboNext').textContent = '다음: ' + ns.name + '까지 ' + (ns.min - gameState.combo) + '콤보!';
    document.getElementById('gpComboNext').style.display = 'block';
  } else {
    fill.style.width = '100%';
    fill.style.background = 'linear-gradient(90deg, #f00, #ff0, #0f0, #0ff, #00f, #f0f)';
    document.getElementById('gpComboLabel').textContent = 'MAX!';
    document.getElementById('gpComboNext').textContent = '🌈 최고 단계 달성!';
  }
}

function getStageInfo(c) {
  const stages = [
    { name: '초급', range: [10, 30] },
    { name: '중급', range: [20, 50] },
    { name: '고급', range: [30, 80] },
    { name: '극급', range: [50, 99] }
  ];
  const idx = Math.min(Math.floor(c / 10), stages.length - 1);
  return stages[idx];
}

function generateQuestion() {
  const st = getStageInfo(gameState.answers.length);
  const [min, max] = st.range;
  gameState.numA = Math.floor(Math.random() * (max - min + 1)) + min;
  gameState.numB = Math.floor(Math.random() * (gameState.numA - 9 + 1)) + 10;
  if (gameState.numB >= gameState.numA) gameState.numB = gameState.numA - 1;
  gameState.correctAnswer = gameState.numA - gameState.numB;
  gameState.currentAnswer = '';
  gameState.answerTime = Date.now();
  updateGameUI();
}

function updateGameUI() {
  document.getElementById('gpScoreVal').textContent = gameState.score.toLocaleString();
  document.getElementById('gpComboVal').textContent = 'x' + gameState.combo;
  document.getElementById('gpDifficulty').textContent = getStageInfo(gameState.answers.length).name;
  let h = '';
  for (let i = 0; i < 3; i++) h += i < gameState.lives ? '♥' : ' ';
  document.getElementById('gpHearts').textContent = h;
  const d = gameState.currentAnswer || '- - -';
  document.getElementById('gpInputDisplay').textContent = d.split('').join(' ');
  updateComboUI();
}

function startGame() {
  gameState.score = 0;
  gameState.lives = 3;
  gameState.combo = 0;
  gameState.maxCombo = 0;
  gameState.geniusCount = 0;
  gameState.totalTaps = 0;
  gameState.answers = [];
  gameState.isGameActive = true;
  gameState.feverMode = false;
  gameState.startTime = Date.now();
  showScreen('gameplay');
  generateQuestion();
  updateGameUI();
  animateGameplay();
}

function endGame() {
  gameState.isGameActive = false;
  gameState.maxCombo = Math.max(gameState.maxCombo, gameState.combo);
  const isNew = gameState.score > gameState.bestScore;
  if (isNew) {
    gameState.bestScore = gameState.score;
    localStorage.setItem('bestScore', gameState.bestScore);
  }
  document.getElementById('bestScoreVal').textContent = gameState.bestScore.toLocaleString() + '점';
  document.getElementById('goScore').textContent = gameState.score.toLocaleString();
  document.getElementById('goNewBestMsg').style.display = isNew ? 'block' : 'none';
  const rank = gameState.score >= 8000 ? 'S' : gameState.score >= 5000 ? 'A' : gameState.score >= 3000 ? 'B' : gameState.score >= 1000 ? 'C' : 'D';
  document.getElementById('goRankBadge').textContent = rank + ' 랭크';
  const rem = 30 - (gameState.answers.length % 10);
  document.getElementById('goMsg1').textContent = '🔥 다음 스테이지까지 ' + rem + '문제';
  document.getElementById('goProgressFill1').style.width = ((gameState.answers.length % 10) / 10 * 100) + '%';
  const diff = Math.max(0, gameState.bestScore + 1000 - gameState.score);
  document.getElementById('goMsg2').textContent = '최고기록까지 ' + diff.toLocaleString() + '점';
  document.getElementById('goProgressFill2').style.width = (Math.max(0, gameState.score - (gameState.bestScore - 1000)) / 1000 * 100) + '%';
  const s = [
    '스테이지: ' + (Math.floor(gameState.answers.length / 10) + 1),
    '최고 콤보: x' + gameState.maxCombo,
    '총 탭: ' + gameState.totalTaps,
    'GENIUS: ' + gameState.geniusCount + '회'
  ];
  document.getElementById('goStats').innerHTML = s.map(x => '<div>' + x + '</div>').join('');
  showScreen('gameover');
}

function drawConstellation() {
  const cv = document.getElementById('constellationCanvas');
  cv.width = window.innerWidth;
  cv.height = window.innerHeight;
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, cv.width, cv.height);
  for (let i = 0; i < 200; i++) {
    const x = Math.random() * cv.width, y = Math.random() * cv.height, s = Math.random() * 1.5 + 0.5;
    ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.5 + 0.3})`;
    ctx.beginPath();
    ctx.arc(x, y, s, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawTitle() {
  const cv = document.getElementById('titleCanvas');
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.imageSmoothingEnabled = false;
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 66px "DotGothic16", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('빼봐영', cv.width / 2, cv.height / 2);
}

function drawGem() {
  const cv = document.getElementById('gemCanvas');
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, 72, 72);
  ctx.fillStyle = '#ff4488';
  ctx.beginPath();
  ctx.moveTo(36, 8);
  ctx.lineTo(56, 32);
  ctx.lineTo(56, 56);
  ctx.lineTo(36, 64);
  ctx.lineTo(16, 56);
  ctx.lineTo(16, 32);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#ff66aa';
  ctx.beginPath();
  ctx.moveTo(36, 20);
  ctx.lineTo(48, 32);
  ctx.lineTo(36, 48);
  ctx.closePath();
  ctx.fill();
}

function initStartScreen() {
  drawConstellation();
  drawTitle();
  drawGem();
  const chars = document.getElementById('startChars');
  chars.innerHTML = '';
  ['#9050c0', '#e04080', '#e09020', '#30b030', '#3080e0'].forEach(c => {
    const cv = document.createElement('canvas');
    cv.width = 16;
    cv.height = 16;
    const ctx = cv.getContext('2d');
    drawPixelChar(ctx, c, '#ffcc66');
    cv.style.imageRendering = 'pixelated';
    chars.appendChild(cv);

  requestAnimationFrame(initStartScreen);
}

let gpNumCtx, currentNum = 47, targetNum = 47, slotY = 0, slotSpeed = 0, slotRunning = false;

function initGameplayScreen() {
  gpNumCtx = document.getElementById('gpNumCanvas').getContext('2d');
  const themeBar = document.getElementById('gpThemeBar');
  themeBar.innerHTML = '';
  themes.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'themeBtn' + (i === 0 ? ' active' : '');
    btn.textContent = t.name;
    function selectTheme() {
      gameState.selectedTheme = i;
      document.querySelectorAll('#gpThemeBar .themeBtn').forEach((x, j) => x.className = 'themeBtn' + (j === i ? ' active' : ''));
      bgParticles = [];
    }
    let touched = false;
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      touched = true;
      selectTheme();
    }, { passive: false });
    btn.addEventListener('click', () => {
      if (touched) { touched = false; return; }
      selectTheme();
    });
    themeBar.appendChild(btn);
  });
  const keypad = document.getElementById('gpKeypad');
  keypad.innerHTML = '';
  function bindKey(btn, key) {
    let touched = false;
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      touched = true;
      btn.classList.add('pressed');
      onKeyPress(key);
    }, { passive: false });
    btn.addEventListener('touchend', () => {
      btn.classList.remove('pressed');
    });
    btn.addEventListener('click', (e) => {
      if (touched) { touched = false; return; }
      onKeyPress(key);
    });
  }
  for (let i = 1; i <= 9; i++) {
    const btn = document.createElement('button');
    btn.className = 'gpKey';
    btn.textContent = i;
    bindKey(btn, i);
    keypad.appendChild(btn);
  }
  const b = document.createElement('button');
  b.className = 'gpKey back';
  b.textContent = '←';
  bindKey(b, 'back');
  keypad.appendChild(b);
  const z = document.createElement('button');
  z.className = 'gpKey';
  z.textContent = '0';
  bindKey(z, 0);
  keypad.appendChild(z);
  const ok = document.createElement('button');
  ok.className = 'gpKey ok';
  ok.textContent = 'OK';
  bindKey(ok, 'ok');
  keypad.appendChild(ok);
  const gpTop = document.getElementById('gpTopChars');
  gpTop.innerHTML = '';
  ['#9050c0', '#e04080', '#e09020'].forEach(c => {
    const cv = document.createElement('canvas');
    cv.width = 16;
    cv.height = 16;
    cv.style.imageRendering = 'pixelated';
    const ctx = cv.getContext('2d');
    drawPixelChar(ctx, c, '#ffcc66');
    gpTop.appendChild(cv);
  });
  drawCharFace(document.getElementById('gpFaceChar'), 'idle');
}

function animateGameplay() {
  if (!gameState.isGameActive) return;
  const cv = document.getElementById('gpBgCanvas');
  cv.width = window.innerWidth;
  cv.height = window.innerHeight;
  const ctx = cv.getContext('2d');
  const t = themes[gameState.selectedTheme];
  const g = ctx.createLinearGradient(0, 0, 0, cv.height);
  g.addColorStop(0, t.bg1);
  g.addColorStop(1, t.bg2);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, cv.width, cv.height);
  if (Math.random() < 0.1) {
    const p = t.particle;
    if (p === 'star') bgParticles.push({ x: Math.random() * cv.width, y: 0, vy: 0.5 + Math.random(), s: Math.random() * 1.5 + 0.5, c: 'rgba(200, 220, 255, 0.5)' });
  }
  bgParticles.forEach(p => {
    p.y += (p.vy || 0);
    p.x += (p.vx || 0);
    if (p.life !== undefined) {
      p.life -= (p.decay || 0.01);
      ctx.globalAlpha = Math.max(0, p.life);
    }
    ctx.fillStyle = p.c;
    if (p.type === 'circle') {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(p.x, p.y, p.s, p.s);
    }
  });
  ctx.globalAlpha = 1;
  bgParticles = bgParticles.filter(p => p.y > -10 && p.y < cv.height + 10 && (p.life === undefined || p.life > 0));
  drawGameplayNum();
  animateFx();
  requestAnimationFrame(animateGameplay);
}

function drawGameplayNum() {
  gpNumCtx.clearRect(0, 0, 80, 50);
  gpNumCtx.imageSmoothingEnabled = false;
  const a = gameState.numA < 10 ? '0' + gameState.numA : '' + gameState.numA;
  const b = gameState.numB < 10 ? '0' + gameState.numB : '' + gameState.numB;
  gpNumCtx.font = 'bold 28px "DotGothic16", monospace';
  gpNumCtx.textAlign = 'center';
  gpNumCtx.textBaseline = 'middle';
  gpNumCtx.fillStyle = '#ffd700';
  gpNumCtx.fillText(a, 40, 15);
  gpNumCtx.font = 'bold 16px "DotGothic16", monospace';
  gpNumCtx.fillText('-', 40, 25);
  gpNumCtx.font = 'bold 28px "DotGothic16", monospace';
  gpNumCtx.fillText(b, 40, 35);
}

function animateFx() {
  const cv = document.getElementById('gpFxCanvas');
  if (!cv) return;
  cv.width = window.innerWidth;
  cv.height = window.innerHeight;
  const ctx = cv.getContext('2d');
  fxParticles.forEach(p => {
    p.x += p.vx;
    p.y += (p.vy || 0);
    p.vy = (p.vy || 0) + 0.1;
    p.life -= p.decay;
    if (p.life > 0) {
      ctx.globalAlpha = p.life;
      if (p.text) {
        ctx.fillStyle = p.c;
        ctx.font = `${p.size}px "DotGothic16"`;
        ctx.textAlign = 'center';
        ctx.fillText(p.text, p.x, p.y);
      } else {
        ctx.fillStyle = p.c;
        ctx.fillRect(Math.floor(p.x), Math.floor(p.y), Math.floor(p.s), Math.floor(p.s));
      }
    }
  });
  ctx.globalAlpha = 1;
  fxParticles = fxParticles.filter(p => p.life > 0);
}

function spawnCorrectFx() {
  const cy = window.innerHeight * 0.4;
  for (let i = 0; i < 40; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = Math.random() * 6 + 2;
    const colors = ['#ffd700', '#ff8c00', '#ff4500', '#ffeb3b'];
    fxParticles.push({
      x: window.innerWidth / 2,
      y: cy,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp - 2,
      s: Math.random() * 5 + 2,
      c: colors[Math.floor(Math.random() * colors.length)],
      life: 1,
      decay: Math.random() * 0.02 + 0.01
    });
  }
}

function onKeyPress(key) {
  gameState.totalTaps++;
  playSound('keypress');
  if (key === 'ok') {
    const ans = parseInt(gameState.currentAnswer) || 0;
    const correct = ans === gameState.correctAnswer;
    if (correct) {
      const time = Date.now() - gameState.answerTime;
      const genius = time < 1500;
      let pts = 100 + gameState.answers.length * 5;
      if (genius) {
        pts += 200;
        gameState.geniusCount++;
        document.getElementById('gpGeniusText').style.opacity = '1';
      } else {
        document.getElementById('gpGeniusText').style.opacity = '0.2';
      }
      if (gameState.feverMode) pts *= 2;
      gameState.score += pts;
      gameState.combo++;
      gameState.answers.push(gameState.correctAnswer);
      if (gameState.combo % 10 === 0 && !gameState.feverMode) {
        gameState.feverMode = true;
        const banner = document.getElementById('gpFeverBanner');
        banner.style.opacity = '1';
        banner.textContent = '🔥 피버 타임! 지금부터 점수 두배! 🔥';
      }
      spawnCorrectFx();
      drawCharFace(document.getElementById('gpFaceChar'), 'correct');
      playSound('correct');
      generateQuestion();
      updateGameUI();
      setTimeout(() => {
        drawCharFace(document.getElementById('gpFaceChar'), gameState.feverMode ? 'fever' : 'idle');
      }, 300);
    } else {
      gameState.combo = 0;
      gameState.lives--;
      gameState.feverMode = false;
      document.getElementById('gpFeverBanner').style.opacity = '0';
      document.getElementById('gpContent').classList.add('shake');
      document.getElementById('screenGameplay').classList.add('wrongFlash');
      drawCharFace(document.getElementById('gpFaceChar'), 'wrong');
      playSound('wrong');
      setTimeout(() => {
        document.getElementById('gpContent').classList.remove('shake');
        document.getElementById('screenGameplay').classList.remove('wrongFlash');
        drawCharFace(document.getElementById('gpFaceChar'), 'idle');
      }, 300);
      updateGameUI();
      if (gameState.lives <= 0) endGame();
    }
  } else if (key === 'back') {
    gameState.currentAnswer = gameState.currentAnswer.slice(0, -1);
    updateGameUI();
  } else {
    if (gameState.currentAnswer.length < 3) {
      gameState.currentAnswer += key;
      updateGameUI();
    }
  }
}

function initCollectionScreen() {
  const grid = document.getElementById('skinGrid');
  grid.innerHTML = '';
  skins.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'skinCard' + (s.unlocked ? '' : ' locked') + (s.sel ? ' selected' : '');
    const cv = document.createElement('canvas');
    cv.width = 16;
    cv.height = 16;
    cv.className = 'skinCanvas';
    const ctx = cv.getContext('2d');
    if (s.body === 'rainbow') {
      const cols = ['#ff0000', '#ff8000', '#ffff00', '#00ff00', '#0080ff', '#8000ff'];
      for (let y = 2; y < 14; y++) {
        ctx.fillStyle = cols[Math.floor((y - 2) / 2) % 6];
        for (let x = 2; x < 14; x++) ctx.fillRect(x, y, 1, 1);
      }
    } else {
      drawPixelChar(ctx, s.body, s.cheek);
    }
    card.appendChild(cv);
    const name = document.createElement('div');
    name.className = 'skinName';
    name.textContent = s.name;
    card.appendChild(name);
    if (!s.unlocked) {
      const req = document.createElement('div');
      req.className = 'skinReq';
      req.textContent = s.req;
      card.appendChild(req);
    }
    function selectSkin() {
      if (s.unlocked) {
        document.querySelectorAll('.skinCard').forEach(x => x.classList.remove('selected'));
        card.classList.add('selected');
      }
    }
    let skinTouched = false;
    card.addEventListener('touchstart', (e) => {
      skinTouched = true;
      selectSkin();
    });
    card.addEventListener('click', () => {
      if (skinTouched) { skinTouched = false; return; }
      selectSkin();
    });
    grid.appendChild(card);
  });

  const aList = document.getElementById('achieveList');
  aList.innerHTML = '';
  achievements.forEach(a => {
    const card = document.createElement('div');
    card.className = 'achieveCard' + (a.done ? ' done' : '');
    card.innerHTML = `
      <div class="achieveIcon">${a.icon}</div>
      <div class="achieveInfo">
        <div class="achieveTitle">${a.title} ${a.done ? '<span class="achieveBadge">✓ 달성!</span>' : ''}</div>
        <div class="achieveDesc">${a.desc}</div>
        <div class="achieveBar"><div class="achieveFill" style="width: ${(a.cur / a.max * 100)}%;"></div></div>
        <div class="achieveReward">🎁 ${a.reward}${!a.done ? ' — ' + Math.min(a.cur, a.max) + '/' + a.max : ''}</div>
      </div>
    `;
    aList.appendChild(card);
  });

  const tList = document.getElementById('titleList');
  tList.innerHTML = '';
  titles.forEach(t => {
    const card = document.createElement('div');
    card.className = 'titleCard' + (t.equipped ? ' equipped' : '') + (t.unlocked ? '' : ' locked');
    const ns = t.color === 'rainbow' ? 'background: linear-gradient(90deg, #f00, #ff0, #0f0, #0ff, #00f, #f0f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;' : 'color: ' + t.color;
    card.innerHTML = `
      <div class="titleInfo">
        <div class="titleName" style="${ns}">${t.name}</div>
        <div class="titleCond">${t.unlocked ? '달성 완료' : '조건: ' + t.cond}</div>
      </div>
      ${t.unlocked ? '<button class="equipBtn">' + (t.equipped ? '장착중' : '장착') + '</button>' : '<span style="font-size: 12px;">🔒</span>'}
    `;
    tList.appendChild(card);
  });
}

function initRankingScreen() {
  const list = document.getElementById('rankList');
  list.innerHTML = '';
  ranks.forEach(p => {
    const row = document.createElement('div');
    row.className = 'rankRow';
    const cv = document.createElement('canvas');
    cv.width = 16;
    cv.height = 16;
    cv.className = 'rankAvatar';
    const ctx = cv.getContext('2d');
    drawPixelChar(ctx, p.color, '#ffcc66');
    const posClass = p.pos === 1 ? 'gold' : p.pos === 2 ? 'silver' : p.pos === 3 ? 'bronze' : '';
    const posIcon = p.pos === 1 ? '🥇' : p.pos === 2 ? '🥈' : p.pos === 3 ? '🥉' : p.pos;
    const titleTag = p.title ? `<span class="rankTitleTag" style="color: ${p.titleColor}; border-color: ${p.titleColor};">${p.title}</span>` : '';
    row.innerHTML = `
      <div class="rankPos ${posClass}">${posIcon}</div>
      <div class="rankInfo">
        <div class="rankName">${p.name} ${titleTag}</div>
        <div class="rankScore">⭐ ${p.score} · ${p.combo}</div>
      </div>
      <div class="rankChangeSmall">—</div>
    `;
    row.insertBefore(cv, row.children[1]);
    list.appendChild(row);
  });
}

function setupCollectionTabs() {
  document.querySelectorAll('.collTab').forEach(tab => {
    function activate() {
      const page = tab.dataset.tab;
      document.querySelectorAll('.collTab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('[id$="-page"]').forEach(p => p.style.display = 'none');
      tab.classList.add('active');
      document.getElementById(page + '-page').style.display = 'block';
    }
    let touched = false;
    tab.addEventListener('touchstart', (e) => {
      e.preventDefault();
      touched = true;
      activate();
    }, { passive: false });
    tab.addEventListener('click', () => {
      if (touched) { touched = false; return; }
      activate();
    });
  });
}

window.addEventListener('load', () => {
  initStartScreen();
  initGameplayScreen();
  initCollectionScreen();
  initRankingScreen();
  setupCollectionTabs();
  setInterval(() => {
    const now = new Date();
    document.getElementById('timeDisplay').textContent = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  }, 1000);
  document.addEventListener('touchmove', (e) => {
    if (e.target.closest('.rankList, .collPages, .gpKeypad, .goButtons, .goContent')) return;
    e.preventDefault();
  }, { passive: false });

  // Button event listeners with touch support for mobile
  function bindBtn(id, fn) {
    const el = document.getElementById(id);
    if (!el) return;
    let touched = false;
    el.addEventListener('touchstart', (e) => {
      e.preventDefault();
      touched = true;
      fn();
    }, { passive: false });
    el.addEventListener('click', () => {
      if (touched) { touched = false; return; }
      fn();
    });
  }
  bindBtn('startBtn', () => startGame());
  bindBtn('retryBtn', () => startGame());
  bindBtn('collectionBtn', () => showScreen('collection'));
  bindBtn('rankingBtn', () => showScreen('ranking'));
  bindBtn('homeBtn', () => showScreen('start'));
  bindBtn('collBackBtn', () => showScreen('start'));
  bindBtn('rankBackBtn', () => showScreen('start'));
});
</script>
