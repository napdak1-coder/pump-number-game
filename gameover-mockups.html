/* 네비게이션 */

.phone{width:340px;height:580px;border-radius:24px;overflow:hidden;position:relative;border:3px solid #143848;box-shadow:0 0 30px rgba(30,90,120,.12)}

/* 공통 게임오버 요소 스타일     */

/* 배경 패턴들 */
.bg-dots{
  background:
    radial-gradient(circle,rgba(255,200,60,.04) 1px,transparent 1px),
    linear-gradient(135deg,#0a1418 0%,#081018 50%,#060c10 100%);
  background-size:6px 6px,auto;
}
.bg-scanlines{
  background:
    repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,220,100,.015) 2px,rgba(255,220,100,.015) 3px),
    radial-gradient(circle,rgba(255,200,60,.03) 1px,transparent 1px),
    linear-gradient(135deg,#0c1810 0%,#081410 50%,#060e0a 100%);
  background-size:auto,5px 5px,auto;
}
.bg-checker{
  background:
    repeating-conic-gradient(rgba(255,210,80,.025) 0% 25%,transparent 0% 50%) 0 0 / 10px 10px,

  background:
    linear-gradient(rgba(255,200,60,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,200,60,.03) 1px,transparent 1px),
    linear-gradient(135deg,#0a0e18 0%,#080a10 100%);
  background-size:8px 8px,8px 8px,auto;

/* 숫자 카운트업 애니메이션 */
@keyframes countBounce{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes slideInLeft{0%{opacity:0;transform:translateX(-40px)}100%{opacity:1;transform:translateX(0)}}
@keyframes slideInRight{0%{opacity:0;transform:translateX(40px)}100%{opacity:1;transform:translateX(0)}}
@keyframes dropIn{0%{opacity:0;transform:translateY(-30px) scale(.7)}60%{transform:translateY(5px) scale(1.05)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes popIn{0%{opacity:0;transform:scale(0)}60%{transform:scale(1.2)}100%{opacity:1;transform:scale(1)}}
@keyframes shakeIn{0%{opacity:0;transform:translateX(-5px)}20%{transform:translateX(5px)}40%{transform:translateX(-3px)}60%{transform:translateX(3px)}80%{transform:translateX(-1px)}100%{opacity:1;transform:translateX(0)}}
@keyframes fadeUp{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
@keyframes zoomBounce{0%{opacity:0;transform:scale(0) rotate(-10deg)}50%{transform:scale(1.15) rotate(2deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
@keyframes glitchIn{0%{opacity:0;transform:translate(-3px,2px);filter:hue-rotate(90deg)}25%{transform:translate(3px,-2px);filter:hue-rotate(-90deg)}50%{opacity:1;transform:translate(-1px,1px);filter:none}75%{transform:translate(1px,-1px)}100%{opacity:1;transform:translate(0);filter:none}}
@keyframes pixelReveal{0%{clip-path:inset(0 100% 0 0)}100%{clip-path:inset(0 0 0 0)}}
@keyframes tvOn{0%{clip-path:inset(50% 0);opacity:0}40%{clip-path:inset(0);opacity:.5}100%{clip-path:inset(0);opacity:1}}
@keyframes floatUp{0%{transform:translateY(0)}50%{transform:translateY(-6px)}100%{transform:translateY(0)}}
</style>

<body>

<div class="nav" id="nav"></div>

<script>
const MOCKUPS=10;
const nav=document.getElementById('nav');
for(let i=1;i<=MOCKUPS;i++){
  const btn=document.createElement('button');
  btn.textContent='#'+i;
  btn.onclick=()=>{
    document.querySelectorAll('.wrap').forEach(w=>w.classList.remove('active'));
    document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
    document.getElementById('m'+i).classList.add('active');
    btn.classList.add('active');
    // restart animations
    restartMockup(i);
  };
  nav.appendChild(btn);
}

/* 카운트업 애니메이션 */
function countUp(el,target,duration=1200,prefix='',suffix=''){
  const start=performance.now();
  const animate=(now)=>{
    const p=Math.min((now-start)/duration,1);
    const eased=1-Math.pow(1-p,3); // easeOutCubic
    el.textContent=prefix+Math.floor(target*eased).toLocaleString()+suffix;
    if(p<1)requestAnimationFrame(animate);
    else{el.textContent=prefix+target.toLocaleString()+suffix;el.style.animation='countBounce .3s ease'}
  };
  requestAnimationFrame(animate);
}

/* 순차 등장 애니메이션 */
function sequentialReveal(container,animClass,baseDelay=200,increment=150){
  const items=container.querySelectorAll('[data-seq]');
  items.forEach(el=>{
    el.style.opacity='0';
    const idx=parseInt(el.dataset.seq);
    setTimeout(()=>{
      el.style.opacity='1';
      el.style.animation=animClass+' .5s ease forwards';
    },baseDelay+idx*increment);
  });
}

function restartMockup(n){
  const wrap=document.getElementById('m'+n);
  if(!wrap)return;
  // Reset all sequential items
  wrap.querySelectorAll('[data-seq]').forEach(el=>{el.style.opacity='0';el.style.animation='none'});
  wrap.querySelectorAll('[data-count]').forEach(el=>{el.textContent='0'});
  setTimeout(()=>{
    if(builders[n])builders[n]();
  },100);
}

const builders={};
const SCORE=12450, BEST=84827, STAGE='18/30', COMBO=12, GENIUS=5, REVERSE=3;

/* ============================================ */
/*  목업 1: 아케이드 코인 삽입 스타일            */
/* ============================================ */
builders[1]=function(){
  const w=document.getElementById('m1');
  sequentialReveal(w,'dropIn',300,200);
  setTimeout(()=>{
    countUp(w.querySelector('.m1-score'),SCORE,1500);
    countUp(w.querySelector('.m1-best'),BEST,2000);
    countUp(w.querySelector('.m1-combo'),COMBO,800);
  },800);
};

/* ============================================ */
/*  목업 2: 넷플릭스 두둥 + 폭발                */
/* ============================================ */
builders[2]=function(){
  const w=document.getElementById('m2');
  sequentialReveal(w,'zoomBounce',200,250);
  setTimeout(()=>{
    countUp(w.querySelector('.m2-score'),SCORE,1500);
    countUp(w.querySelector('.m2-best'),BEST,2000);
    countUp(w.querySelector('.m2-combo'),COMBO,800);
  },900);
};

/* ============================================ */
/*  목업 3: 픽셀 유령 + 사이드슬라이드           */
/* ============================================ */
builders[3]=function(){
  const w=document.getElementById('m3');
  const items=w.querySelectorAll('[data-seq]');
  items.forEach(el=>{
    el.style.opacity='0';
    const idx=parseInt(el.dataset.seq);
    const anim=idx%2===0?'slideInLeft':'slideInRight';
    setTimeout(()=>{
      el.style.opacity='1';
      el.style.animation=anim+' .5s ease forwards';
    },300+idx*180);
  });
  setTimeout(()=>{
    countUp(w.querySelector('.m3-score'),SCORE,1500);
    countUp(w.querySelector('.m3-best'),BEST,2000);
    countUp(w.querySelector('.m3-combo'),COMBO,800);

};

/* ============================================ */
/*  목업 10: 픽셀 폭죽 + 풀 플로우                */
/* ============================================ */
builders[10]=function(){
  const w=document.getElementById('m10');
  sequentialReveal(w,'zoomBounce',400,220);
  setTimeout(()=>{
    countUp(w.querySelector('.m10-score'),SCORE,1800);
    countUp(w.querySelector('.m10-best'),BEST,2200);
    countUp(w.querySelector('.m10-combo'),COMBO,1000);
  },1000);
  // 폭죽 파티클
  const canvas=w.querySelector('.m10-firework');
  if(canvas){
    canvas.width=340;canvas.height=580;
    const ctx=canvas.getContext('2d');
    const particles=[];
    for(let i=0;i<40;i++){
      particles.push({
        x:170+Math.random()*60-30,y:120,
        vx:(Math.random()-.5)*4,vy:Math.random()*-5-2,
        size:Math.random()*3+2,
        color:['#ffd700','#ff6b35','#50e880','#60d8e0','#ff4060'][Math.floor(Math.random()*5)],
        life:1
      });
    }
    function drawFirework(){
      ctx.clearRect(0,0,340,580);
      particles.forEach(p=>{
        p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life-=.015;
        if(p.life>0){
          ctx.globalAlpha=p.life;
          ctx.fillStyle=p.color;
          ctx.fillRect(Math.floor(p.x/3)*3,Math.floor(p.y/3)*3,p.size,p.size);
        }
      });
      ctx.globalAlpha=1;
      if(particles.some(p=>p.life>0))requestAnimationFrame(drawFirework);
    }
    setTimeout(drawFirework,500);
  }
};
